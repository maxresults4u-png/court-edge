// Winner ran Harden at 6.7% own for 53 FP. Lineups missing a "Harden slot"

const LEVERAGE_OWN_MAX = 12;
const LEVERAGE_VALUE_MIN = 5.0;
const GPP_CUMOWN_STRICT = 230;
const GPP_CUMOWN_RELAXED = 260;

function lineupHasLeverage(lineup) {
  return lineup.some(p => (p.ownership || 100) < LEVERAGE_OWN_MAX && (p.value || 0) >= LEVERAGE_VALUE_MIN);
}
function lineupCumOwn(lineup) {
  return lineup.reduce((s, p) => s + (p.ownership || 0), 0);
}
function classifyLeverageTier(pool) {
  if (!pool || pool.length === 0) return;
  const values = pool.map(p => p.value || 0).filter(v => v > 0).sort((a, b) => b - a);
  if (values.length === 0) return;
  const p30 = values[Math.floor(values.length * 0.30)] || 0;
  const p40 = values[Math.floor(values.length * 0.40)] || 0;
  pool.forEach(p => {
    const v = p.value || 0, own = p.ownership || 0;
    if (v >= p30 && own < LEVERAGE_OWN_MAX && v >= LEVERAGE_VALUE_MIN) p.leverageTier = "ELITE";
    else if (v >= p40 && own < 15 && v >= 4.0) p.leverageTier = "GOOD";
    else if (own >= 35) p.leverageTier = "CHALK";
    else p.leverageTier = "NEUTRAL";
  });
}
function toStatMuseSlug(name) { return name.toLowerCase().replace(/['']/g, "").replace(/[^a-z0-9\s-]/g, "").trim().replace(/\s+/g, "-"); }

function buildTeamMap(games) {
  const teamMap = {};
  for (const g of games) {
    const spread = g.homeSpread;
    const homeImpl = +((g.total / 2) - (spread / 2)).toFixed(1);
    const awayImpl = +(g.total - homeImpl).toFixed(1);
    teamMap[g.home] = { total: g.total, impliedPts: homeImpl, spread, moneyline: g.homeML, opponent: g.away, gameStr: `${g.away}@${g.home}`, isHome: true };
    teamMap[g.away] = { total: g.total, impliedPts: awayImpl, spread: -spread, moneyline: g.awayML, opponent: g.home, gameStr: `${g.away}@${g.home}`, isHome: false };
  }
  return teamMap;
}
function buildGamesList(games) {
  return games.map(g => {
    const homeImpl = +((g.total / 2) - (g.homeSpread / 2)).toFixed(1);
    const awayImpl = +(g.total - homeImpl).toFixed(1);
    return { home: g.home, away: g.away, total: g.total, homeImpl, awayImpl, homeSpread: g.homeSpread, gameStr: `${g.away}@${g.home}` };
  });

function buildProjectionBoostMap(outPlayers, cascadeRules) {
  const boosts = {};
  for (const outName of outPlayers) {
    const rules = cascadeRules.filter(r => r.trigger.toLowerCase() === outName.toLowerCase());
    for (const rule of rules) {
      for (const b of rule.beneficiaries) {
        const key = b.name.toLowerCase();
        if (!boosts[key]) boosts[key] = { projBoost: 1, minutesBoost: 1, notes: [] };
        boosts[key].projBoost *= (b.projBoost || 1);
        boosts[key].minutesBoost *= (b.minutesBoost || 1);
        if (b.note) boosts[key].notes.push(`${outName}: ${b.note}`);
      }
    }
  }
  return boosts;
}

// ============================================================================
// DvP MATCHUP ADJUSTMENT
// dvpMap: { [teamAbbr]: { PG: pts_allowed, SG: ..., SF: ..., PF: ..., C: ... } }
// Returns a multiplier: 1.08 = team allows 8% more FD pts to this position
// ============================================================================
function dvpAdj(player, teamMap, dvpMap) {
  const opponent = teamMap[player.team]?.opponent;
  if (!opponent || !dvpMap[opponent]) return 1.0;
  const pos = player.positions[0];
  const baseline = LEAGUE_AVG_DVP[pos] || 41.0;
  const allowed = dvpMap[opponent][pos];
  if (!allowed || allowed <= 0) return 1.0;
  // [v5.6] Tightened clamp ±18% → ±12% after Apr 19 post-mortem
  // (Tatum hit 53.7 despite BOS-tier penalty — model was over-penalizing tough D)
  let mult = clamp(allowed / baseline, 0.88, 1.12);
  // [v5.6] Star carveout: elite usage players (FPPG >= 45) get half the DvP penalty
  // Tough D suppresses role players but can't lock down a true #1 option.
  // Models the fact that stars have usage-driven ceilings, not matchup-driven ones.
  const fppg = player.csvFppg || player.fppg || 0;
  if (fppg >= 45 && mult < 1.0) {
    mult = 1.0 - (1.0 - mult) * 0.5;
  }
  return mult;
}

function dvpGrade(multiplier) {
  if (multiplier >= DVP_GRADES.A) return { grade: "A", color: "#22c55e" };
  if (multiplier >= DVP_GRADES.B) return { grade: "B", color: "#86efac" };
  if (multiplier >= DVP_GRADES.C) return { grade: "C", color: "#94a3b8" };
  if (multiplier >= DVP_GRADES.D) return { grade: "D", color: "#f59e0b" };
  return { grade: "F", color: "#ef4444" };
}

// ============================================================================
// MINUTES MODEL
// Estimates a player's minutes from their salary tier and FPPG
// Returns { minutes, perMin } — used for injury cascade math
// ============================================================================
function estimateMinutes(player) {
  // Override: user can supply player.minutes directly
  if (player.minutes > 0) return { minutes: player.minutes, perMin: player.csvFppg / player.minutes };
  // [v5.4] Use FPPG to infer role — much more accurate than salary for injury cascade
  // Salary can be misleading (injured player at min salary still has high FPPG from healthy games)
  const fppg = player.csvFppg || player.fppg || 0;
  let mins;
  if      (fppg >= 45) mins = 36;
  else if (fppg >= 38) mins = 34;
  else if (fppg >= 32) mins = 31;
  else if (fppg >= 26) mins = 28;
  else if (fppg >= 20) mins = 24;
  else if (fppg >= 15) mins = 19;
  else if (fppg >= 10) mins = 14;
  else                 mins = 9;
  // Cross-check with salary: if salary suggests a clear bench role, cap minutes
  // [v5.6 tune] Old buckets were too stingy — Sharpe at $4900 was capped at 22min
  // despite being a 30+ min starter. Bumped up so value starters aren't shortchanged.
  const sal = player.salary;
  const salCap = sal >= 9000 ? 38 : sal >= 7000 ? 36 : sal >= 5500 ? 34 : sal >= 4500 ? 30 : sal >= 3500 ? 24 : 18;
  mins = Math.min(mins, salCap);
  const perMin = mins > 0 ? fppg / mins : 0;
  return { minutes: mins, perMin };
}

// ============================================================================
// AUTO MINUTES CASCADE
// When a player is OUT, redistribute their minutes to positional teammates.
// Returns: { [playerName]: { minuteBoost, projBoost, note } }
// ============================================================================
function autoMinutesCascade(outPlayers, allPlayers, teamMap) {
  const boosts = {};
  for (const outName of outPlayers) {
    const outP = allPlayers.find(p => p.name.toLowerCase() === outName.toLowerCase());
    if (!outP) continue;
    const { minutes: outMins, perMin: outRate } = estimateMinutes(outP);
    if (outMins <= 0 || outRate <= 0) continue;
    // Find teammates at same or adjacent positions
    // [v5.4] Removed salary < outP.salary filter — injured min-salary players
    // (like Lillard at $3500) still have real rotation impact on their teammates
    // Sort by salary descending: highest-salaried same-position teammate absorbs most
    const teammates = allPlayers.filter(p =>
      p.name.toLowerCase() !== outName.toLowerCase() &&
      p.team === outP.team &&
      p.positions.some(pos => outP.positions.includes(pos))
    ).sort((a, b) => b.salary - a.salary).slice(0, 3); // top 3 by salary
    if (!teammates.length) continue;
    // Distribute minutes: first teammate gets ~55%, second 30%, third 15%
    const shares = [0.55, 0.30, 0.15].slice(0, teammates.length);
    const totalShare = shares.reduce((a,b)=>a+b,0);
    teammates.forEach((tm, i) => {
      const rawAbsorbed = outMins * (shares[i] / totalShare);
      // [v5.6] Stamina cap — a bench player can't suddenly play 40+ min.
      // Cap total minutes at 38, only absorb what fits in headroom.
      // This is what was missing — Barlow "absorbed" 19 min on top of his usual 19 (impossible).
      const tmMins = estimateMinutes(tm).minutes;
      const headroom = Math.max(0, 38 - tmMins);
      const absorbedMins = Math.min(rawAbsorbed, headroom);
      // [v5.6] Regression 0.75 → 0.40 — post-mortem Apr 19 (Barlow -80%, Sharpe -54%)
      // Backups are WAY less efficient in extended minutes than the 0.75 assumed.
      const bonusFppg = absorbedMins * outRate * 0.40;
      const key = tm.name.toLowerCase();
      if (!boosts[key]) boosts[key] = { minuteBoost: 0, projBoost: 0, notes: [] };
      boosts[key].minuteBoost += absorbedMins;
      boosts[key].projBoost += bonusFppg;
      boosts[key].notes.push(`+${absorbedMins.toFixed(0)}min from ${outName} OUT (+${bonusFppg.toFixed(1)} FD)`);
    });
  }
  return boosts;
}

function teamContextForPlayer(player, teamMap = {}) {
  const v = teamMap[player.team] || {};
  const impliedPts = safeNum(v.impliedPts, LEAGUE_AVG_IMPLIED);
  const total = safeNum(v.total, LEAGUE_AVG_TOTAL);
  const spread = safeNum(v.spread, 0);
  const absSpread = Math.abs(spread);
  const isFavored = spread < 0;
  const isHome = !!v.isHome;
  // v5.9: Use wider pace scaling (220 = -7%, 240+ = +8% instead of tight 0.93-1.07 clamp)
  const paceRatio = getPaceMultiplier(total);
  const impliedRatio = clamp(impliedPts / LEAGUE_AVG_IMPLIED, 0.93, 1.10);
  const spreadAdj = absSpread <= 4 ? 1.02 : absSpread >= 15 ? 0.94 : absSpread >= 10 ? 0.97 : 1.00;
  const homeAdj = isHome ? 1.015 : 0.985;
  return { total, impliedPts, spread, absSpread, isFavored, isHome, paceRatio, impliedRatio, spreadAdj, homeAdj, opponent: v.opponent || "", gameStr: v.gameStr || player.game };
}

function buildProjection(player, teamMap = {}, projectionBoost = 1, minutesBoost = 1, dvpMap = {}, minuteBoostFppg = 0) {
  const ctx = teamContextForPlayer(player, teamMap);
  const injuryMult = { "": 1.0, P: 0.97, Q: 0.88, D: 0.55, O: 0 }[player.injury] ?? 0.9;
  // v5.9: When backup gets cascade minutes, realistic efficiency is -15%
  const cascadeEfficiency = minuteBoostFppg > 0 ? 0.85 : 1.0;
  const injuryEfficiency = injuryMult * cascadeEfficiency;
  const statMuseVal = player.statMuseFD;
  const recent5 = safeNum(player.recent5, 0);
  const seasonAvg = safeNum(player.csvFppg || player.fppg, 0);
  let baseFppg;
  if (statMuseVal) { baseFppg = safeNum(player.fppg, 0); }
  else if (recent5 > 0) { baseFppg = recent5 * 0.6 + seasonAvg * 0.4; }
  else { baseFppg = seasonAvg; }
  if (baseFppg <= 0) return null;
  const b2bMult = player.isB2B ? 0.95 : 1.0;
  // DvP matchup multiplier — position vs opponent defensive rating
  const dvpAdjVal = dvpAdj(player, teamMap, dvpMap);
  // Minutes cascade boost (flat FD pts added from absorbing injured player's minutes)
  const minutesCascadeBoost = safeNum(minuteBoostFppg, 0);
  // v5.9: Use injuryEfficiency (includes cascade reduction) instead of just injuryMult
  const projMean = baseFppg * injuryEfficiency * ctx.paceRatio * ctx.impliedRatio * ctx.spreadAdj * ctx.homeAdj * b2bMult * projectionBoost * dvpAdjVal + minutesCascadeBoost;
  let stdev;
  if (player.histStdev && player.histStdev > 0) {
    stdev = player.histStdev;
  } else {
    const cov = 0.22;
    const salaryAdj = player.salary >= 10000 ? 1.8 : player.salary >= 8000 ? 1.2 : player.salary >= 6000 ? 0.6 : 0.2;
    stdev = Math.max(4.5, projMean * cov + salaryAdj);
  }
  const projFloor = Math.max(0, projMean - 1.4 * stdev);
  const projCeiling = projMean + 1.65 * stdev;
  const estMinutes = player.minutes || Math.min(40, Math.max(12, (baseFppg / 1.4) + (player.salary / 1000 - 5) * 1.5));
  const minutesProj = estMinutes * minutesBoost;
  const value = projMean / Math.max(player.salary / 1000, 1);
  return {
    ...player,
    baseFppg: round1(baseFppg), projMean: round1(projMean), projFloor: round1(projFloor),
    projCeiling: round1(projCeiling), stdev: round1(stdev), value: round2(value),
    fppg: round1(projMean), minutesProj: round1(minutesProj),
    gameTotal: ctx.total, impliedPts: ctx.impliedPts, spread: ctx.spread,
    opponent: ctx.opponent, game: ctx.gameStr || player.game, isHome: ctx.isHome,
    dvpAdj: round2(dvpAdjVal), dvpGrade: dvpGrade(dvpAdjVal), minuteBoost: round1(minutesCascadeBoost),
    _adj: { pace: round2(ctx.paceRatio), implied: round2(ctx.impliedRatio), spread: round2(ctx.spreadAdj), home: round2(ctx.homeAdj), injury: round2(injuryEfficiency), b2b: round2(b2bMult), boost: round2(projectionBoost), dvp: round2(dvpAdjVal) },
  };
}

// ============================================================================
// PRA PROJECTION ENGINE — projects per-stat line from:
//   salary tier → base stat split
//   × pace ratio (possessions scale all counting stats)
//   × per-stat DvP vs opponent defense
//   + injury minutes cascade (per-stat boost from absorbed minutes)
// ============================================================================
function buildStatLine(player, teamMap = {}, dvpMap = {}, minuteBoostFppg = 0) {
  const pos = player.positions[0] || 'PG';
  const opp = teamMap[player.team]?.opponent || '';
  const fppg = player.projMean || player.fppg || player.csvFppg || 0;
  if (fppg <= 0) return null;

  // Step 1: Estimate base stat splits from salary tier + position
  // Salary tier correlates with role (starter vs bench)
  const sal = player.salary || 5000;
  const roleScale = sal >= 10000 ? 1.35 : sal >= 8000 ? 1.15 : sal >= 6000 ? 1.0 : sal >= 4500 ? 0.82 : 0.65;

  const avgStats = LEAGUE_AVG_STATS[pos] || LEAGUE_AVG_STATS.PG;
  let base = {
    pts: avgStats.pts * roleScale,
    reb: avgStats.reb * roleScale,
    ast: avgStats.ast * roleScale,
    stl: avgStats.stl * roleScale,
    blk: avgStats.blk * roleScale,
    to:  avgStats.to  * roleScale,
  };

  // Normalize so FD score matches player's actual fppg
  const baseFD = base.pts + base.reb*1.2 + base.ast*1.5 + base.stl*3 + base.blk*3 - base.to;
  if (baseFD > 0) {
    const scale = fppg / baseFD;
    Object.keys(base).forEach(k => { base[k] = base[k] * scale; });
  }

  // Step 2: Pace adjustment — faster pace = more possessions = more of everything
  const ctx = teamMap[player.team] || {};
  const total = ctx.total || LEAGUE_AVG_TOTAL;
  const paceScale = clamp(total / LEAGUE_AVG_TOTAL, 0.92, 1.10);
  Object.keys(base).forEach(k => { base[k] = base[k] * paceScale; });

  // Step 3: Per-stat DvP vs opponent
  const oppStats = DVP_STATS[opp]?.[pos];
  if (oppStats) {
    const avgOppStats = LEAGUE_AVG_STATS[pos];
    // [v5.6] Softer per-stat clamp (0.75-1.30 → 0.82-1.22) to match aggregate DvP
    // + star carveout so elite scorers don't get pts slashed against tough D
    const isStar = fppg >= 45;
    ['pts','reb','ast','stl','blk','to'].forEach(stat => {
      let dvpMult = clamp(oppStats[stat] / (avgOppStats[stat] || 1), 0.82, 1.22);
      if (isStar && dvpMult < 1.0) dvpMult = 1.0 - (1.0 - dvpMult) * 0.5;
      base[stat] = base[stat] * dvpMult;
    });
  }

  // Step 4: Injury minutes cascade — add per-stat boost from absorbed minutes
  // minuteBoostFppg is already computed; distribute it back into stat line proportionally
  if (minuteBoostFppg > 0) {
    const boostFD = base.pts + base.reb*1.2 + base.ast*1.5 + base.stl*3 + base.blk*3 - base.to;
    if (boostFD > 0) {
      const boostScale = (boostFD + minuteBoostFppg) / boostFD;
      Object.keys(base).forEach(k => { base[k] = base[k] * boostScale; });
    }
  }

  // Round to 1 decimal
  const line = {};
  Object.keys(base).forEach(k => { line[k] = Math.round(base[k] * 10) / 10; });

  // Compute implied FD from stat line
  line.impliedFD = Math.round((line.pts + line.reb*1.2 + line.ast*1.5 + line.stl*3 + line.blk*3 - line.to) * 10) / 10;

  return line;
}

function compositeScore(p) {
  const rawLeverage = (p.projCeiling || p.fppg || 0) / Math.max(p.ownership || 5, 5);
  const leverage = Math.min(rawLeverage, 8);
  const stackBonus = p.gameTotal >= 232 ? 2.8 : p.gameTotal >= 226 ? 1.5 : p.gameTotal >= 220 ? 0.5 : 0;
  const statMuseBonus = p.statMuseFD ? 0.75 : 0;
  const ownershipPenalty = Math.max(0, (p.ownership || 0) - 38) * 0.08;
  const valueBonus = (p.value || 0) * 0.4;
  // [v5.4] Mild penalty for min-salary punt plays to prevent full-portfolio locks
  // A $3700 player projecting 19pts shouldn't anchor every lineup
  const puntPenalty = (p.salary <= 3800 && (p.projMean || p.fppg || 0) < 22) ? 1.5 : 0;
  return (
    (p.projMean || p.fppg || 0) * 0.82 +
    (p.projCeiling || p.fppg || 0) * 0.14 +
    leverage * 0.40 + valueBonus + stackBonus + statMuseBonus - ownershipPenalty - puntPenalty
  );
}

function estimateOwnership(player, teamMap) {
  const v = teamMap[player.team];
  if (!v) return 15;
  let base = 8;
  if (v.impliedPts >= 122) base = 24;
  else if (v.impliedPts >= 118) base = 20;
  else if (v.impliedPts >= 114) base = 17;
  else if (v.impliedPts >= 110) base = 14;
  else if (v.impliedPts >= 106) base = 11;
  const salaryTier = player.salary >= 11000 ? 1.7 : player.salary >= 9000 ? 1.4 : player.salary >= 7500 ? 1.2 : player.salary >= 6000 ? 1.05 : player.salary >= 4500 ? 0.9 : 0.75;
  const fppgTier = player.fppg >= 50 ? 1.5 : player.fppg >= 42 ? 1.3 : player.fppg >= 34 ? 1.15 : player.fppg >= 26 ? 1.0 : 0.85;
  const valueTier = player.value >= 7 ? 1.25 : player.value >= 5.5 ? 1.1 : 1.0;
  return Math.min(65, Math.max(2, +(base * salaryTier * fppgTier * valueTier).toFixed(1)));
}

// ============================================================================
// [v5.7] PLAYOFF FPPG ADJUSTMENT
// Regular-season FPPG overstates playoff production for non-stars. Why:
//   - Rotations shrink (10-12 deep → 8-9 deep), bench minutes disappear
//   - Defense tightens, scheme-specific, more film-study per matchup
//   - Usage concentrates on top 2-3 scorers (stars actually go UP)
// Haircut is tiered by role, proxied via FPPG:
//   45+ FPPG (superstars, 10% of slate): +3% — usage increases in playoffs
//   35-44 FPPG (secondaries): -6% — modest squeeze
//   28-34 FPPG (3rd options): -12% — rotation cuts + D focus
//   22-27 FPPG (role players): -18% — biggest squeeze, this is where Sharpe lives
//   15-21 FPPG (rotation/bench): -22%
//   < 15 FPPG: -25% (deep bench barely plays in playoffs)
// ============================================================================
function playoffAdjust(fppg) {
  if (fppg >= 45) return fppg * 1.03;
  if (fppg >= 35) return fppg * 0.94;
  if (fppg >= 28) return fppg * 0.88;
  if (fppg >= 22) return fppg * 0.82;
  if (fppg >= 15) return fppg * 0.78;
  return fppg * 0.75;
}

function parsePlayers(csvText, ownershipMap, statMuseMap = {}, teamMap = {}, outPlayers = [], cascadeRules = [], extraData = {}, dvpMap = {}, playoffMode = false) {
  const lines = csvText.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/\s+/g, ""));
  const players = [];
  const projectionBoosts = buildProjectionBoostMap(outPlayers, cascadeRules);
  const idCol = headers.findIndex(h => h === "id" || h === "playerid" || h === "player_id");
  // Pre-compute auto minute cascades from OUT players
  const _rawPlayers = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(","); if (cols.length < 8) continue;
    const get2 = (key) => cols[headers.indexOf(key)]?.trim() ?? "";
    const n2 = get2("nickname") || ((get2("firstname") + " " + get2("lastname")).trim());
    let f2 = parseFloat(get2("fppg")) || 0;
    // [v5.7] Apply playoff FPPG haircut to the raw source, so cascade math uses adjusted rates
    if (playoffMode && f2 > 0) f2 = playoffAdjust(f2);
    const s2 = parseInt(get2("salary")) || 0;
    const t2 = get2("team"); const inj2 = get2("injuryindicator") || "";
    const pos2 = (get2("rosterposition")||get2("position")).split("/").map(p=>p.trim()).filter(p=>POSITION_ORDER.includes(p));
    if (n2 && s2 && f2 && inj2 !== "O" && pos2.length) _rawPlayers.push({name:n2,fppg:f2,csvFppg:f2,salary:s2,team:t2,positions:pos2,minutes:0});
  }
  // [v5.3] Also cascade players marked OUT in the CSV itself
  const _csvOutPlayers = [];
  for (let _ci = 1; _ci < lines.length; _ci++) {
    const _cc = lines[_ci].split(","); if (_cc.length < 8) continue;
    const _cget = k => _cc[headers.indexOf(k)]?.trim() ?? "";
    const _cn = _cget("nickname") || ((_cget("firstname") + " " + _cget("lastname")).trim());
    const _cinj = _cget("injuryindicator");
    let _cf = parseFloat(_cget("fppg")) || 0;
    // [v5.7] Apply playoff haircut so their cascade per-min rate reflects playoff usage
    if (playoffMode && _cf > 0) _cf = playoffAdjust(_cf);
    const _cs = parseInt(_cget("salary")) || 0;
    const _ct = _cget("team");
    const _cpos = (_cget("rosterposition")||_cget("position")).split("/").map(p=>p.trim()).filter(p=>POSITION_ORDER.includes(p));
    if (_cn && _cinj === "O" && _cf > 0 && _cs > 0 && _cpos.length) {
      _csvOutPlayers.push({name:_cn, fppg:_cf, csvFppg:_cf, salary:_cs, team:_ct, positions:_cpos, minutes:0});
    }
  }
  // Merge CSV-detected OUT players with manually specified out players for cascade
  const _allOutForCascade = [...outPlayers];
  _csvOutPlayers.forEach(p => { if (!_allOutForCascade.includes(p.name)) _allOutForCascade.push(p.name); });
  const _allPlayersForCascade = [..._rawPlayers, ..._csvOutPlayers];
  const _minuteBoosts = autoMinutesCascade(_allOutForCascade, _allPlayersForCascade, teamMap);

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    if (cols.length < 8) continue;
    const get = (key) => cols[headers.indexOf(key)]?.trim() ?? "";
    const fdId = idCol >= 0 ? (cols[idCol]?.trim() ?? "") : "";
    const name = get("nickname") || ((get("firstname") + " " + get("lastname")).trim());
    let csvFppg = parseFloat(get("fppg")) || 0;
    // [v5.7] Playoff haircut — tiered by role (stars +3%, role players -18%)
    if (playoffMode && csvFppg > 0) csvFppg = playoffAdjust(csvFppg);
    const salary = parseInt(get("salary")) || 0;
    const injury = get("injuryindicator") || "";
    const played = parseInt(get("played")) || 0;
    const team = get("team");
    const game = get("game");
    const posRaw = get("rosterposition") || get("position");
    const positions = posRaw.split("/").map(p => p.trim()).filter(p => POSITION_ORDER.includes(p));
    if (!name || !salary || !csvFppg || injury === "O" || positions.length === 0) continue;
    const key = name.toLowerCase();
    const smData = statMuseMap[key];
    const baseFppg = smData?.fdAvg || csvFppg;
    const statMuseFD = !!smData;
    if (baseFppg < RULES.FLOOR_FPPG_MIN) continue;
    const ownership = ownershipMap[key] ?? 15;
    if (ownership < RULES.NEVER_PLAY_OWN_THRESHOLD) continue;
    const boost = projectionBoosts[key]?.projBoost ?? 1;
    const minutesBoost = projectionBoosts[key]?.minutesBoost ?? 1;
    const extra = extraData[key] || {};
    let p = {
      fdId, name, fppg: baseFppg, csvFppg, salary, injury, played, team, game,
      positions, ownership, statMuseFD,
      smLast: smData?.lastGame, smAvg: smData?.fdAvg, smTrend: smData?.trend,
      cascadeNotes: projectionBoosts[key]?.notes || [],
      recent5: extra.recent5 || 0, histStdev: extra.histStdev || 0,
      minutes: extra.minutes || 0, isB2B: !!extra.isB2B,
    };
    const minBoostFppg = (_minuteBoosts[key]?.projBoost) || 0;
    const projected = buildProjection(p, teamMap, boost, minutesBoost, dvpMap, minBoostFppg);
    if (!projected) continue;
    projected.score = compositeScore(projected);
    // Build per-stat projection line for O/U display
    const minBoostForStats = (_minuteBoosts[key]?.projBoost) || 0;
    projected.statLine = buildStatLine(projected, teamMap, dvpMap, minBoostForStats);
    players.push(projected);
  }
  // [v5.8] Tag each player with pool-relative leverage tier before returning
  classifyLeverageTier(players);
  return players.sort((a, b) => b.score - a.score);
}

function getStrategyWeights(type) {
  if (type === "chalk")      return { mean: 1.08, ceiling: 0.18, leverage: 0.14, ownPenalty: 0.012, stackBoost: 0.8, noise: 1.4, bringBack: 0 };
  if (type === "leverage")   return { mean: 0.88, ceiling: 0.38, leverage: 0.55, ownPenalty: 0.006, stackBoost: 4.5, noise: 5.0, bringBack: 2.5 };
  if (type === "tournament") return { mean: 0.78, ceiling: 0.58, leverage: 0.65, ownPenalty: 0.003, stackBoost: 6.5, noise: 8.0, bringBack: 3.5 };
  return                          { mean: 0.98, ceiling: 0.28, leverage: 0.36, ownPenalty: 0.008, stackBoost: 2.0, noise: 3.0, bringBack: 1.0 };
}

function playerObjective(p, weights, stackTeams = [], bringBackTeams = []) {
  const inStack = stackTeams.includes(p.team);
  const inBringBack = bringBackTeams.includes(p.team);
  const stackBonus = inStack ? weights.stackBoost : 0;
  const bringBackBonus = inBringBack ? weights.bringBack : 0;
  const rawLeverage = (p.projCeiling || p.fppg || 0) / Math.max(p.ownership || 5, 5);
  const leverage = Math.min(rawLeverage, 8);
  return (
    (p.projMean || p.fppg || 0) * weights.mean +
    (p.projCeiling || p.fppg || 0) * weights.ceiling +
    leverage * weights.leverage +
    stackBonus + bringBackBonus -
    (p.ownership || 0) * weights.ownPenalty
  );
}

function enumerateLockedAssignments(lockedPlayers, slots) {
  const results = [];
  function dfs(idx, remainingSlots, assigned) {
    if (idx === lockedPlayers.length) { results.push({ assigned: assigned.slice(), remainingSlots: remainingSlots.slice() }); return; }
    const p = lockedPlayers[idx];
    const tried = new Set();
    for (let i = 0; i < remainingSlots.length; i++) {
      const slot = remainingSlots[i];
      if (tried.has(slot)) continue;
      if (!p.positions.includes(slot)) continue;
      tried.add(slot);
      const nextSlots = remainingSlots.slice();
      nextSlots.splice(i, 1);
      assigned.push({ ...p, slot });
      dfs(idx + 1, nextSlots, assigned);
      assigned.pop();
    }
  }
  dfs(0, slots.slice(), []);
  return results;
}
function lineupHasStack(lineup, minStackSize = 2) {
  const counts = {};
  lineup.forEach(p => { counts[p.team] = (counts[p.team] || 0) + 1; });
  return Object.values(counts).some(c => c >= minStackSize);
}
function lineupHasBringBack(lineup, stackTeams, bringBackTeams) {
  if (!stackTeams.length || !bringBackTeams.length) return false;
  const hasStack = lineup.some(p => stackTeams.includes(p.team));
  const hasBB = lineup.some(p => bringBackTeams.includes(p.team));
  return hasStack && hasBB;
}
function lineupKey(lu) { return lu.map(p => p.name).sort().join("|"); }

function buildCandidatePool(players, lockedNames, excludedNames, stackTeams, bringBackTeams, strategyType, attempt, candidateExposure = {}, generatedSoFar = 0) {
  const weights = getStrategyWeights(strategyType);
  const lockSet = new Set(lockedNames);
  const excludeSet = new Set(excludedNames);
  const filtered = players.filter(p => !excludeSet.has(p.name));
  const scored = filtered.map(p => {
    const expCount = candidateExposure[p.name] || 0;
    const expRate = generatedSoFar > 0 ? expCount / generatedSoFar : 0;
    const exposurePenalty = lockSet.has(p.name) ? 0 : Math.max(0, expRate - 0.60) * weights.noise * 3.5;
    return {
      ...p,
      _poolScore: playerObjective(p, weights, stackTeams, bringBackTeams)
        + (Math.random() - 0.5) * weights.noise
        + (attempt * 0.02)
        - exposurePenalty
    };
  });
  if (strategyType === "tournament") {
    const mids = scored.filter(p => p.ownership >= 8 && p.ownership <= 22).slice(0, 12);
    if (mids.length) mids[Math.floor(Math.random() * mids.length)]._poolScore += 5.5;
  }
  scored.sort((a, b) => {
    if (lockSet.has(a.name) && !lockSet.has(b.name)) return -1;
    if (!lockSet.has(a.name) && lockSet.has(b.name)) return 1;
    return b._poolScore - a._poolScore;
  });
  return scored;
}

function getSlotsArray() { return ["C", "PG", "PG", "SG", "SG", "SF", "SF", "PF", "PF"]; }

function buildLineup(players, lockedNames = [], excludedNames = [], strategyType = "mixed", stackTeams = [], bringBackTeams = [], requireStack = true, minStack = 2) {
  const slots = getSlotsArray();
  const lockSet = new Set(lockedNames);
  const excludeSet = new Set(excludedNames);
  const weights = getStrategyWeights(strategyType);
  const usable = players.filter(p => !excludeSet.has(p.name));
  const lockedPlayers = usable.filter(p => lockSet.has(p.name));
  const unlockedPlayers = usable.filter(p => !lockSet.has(p.name));
  const lockedAssignments = enumerateLockedAssignments(lockedPlayers, slots);
  if (!lockedAssignments.length) return null;

  let best = { score: -Infinity, lineup: null };
  const startedAt = Date.now();
  const TIME_BUDGET_MS = strategyType === "chalk" ? 24 : 40;
  const needStack = requireStack && strategyType !== "chalk";

  function fastGreedy(assignment) {
    const needed = assignment.remainingSlots.slice();
    const used = new Set(assignment.assigned.map(p => p.name));
    const lineup = assignment.assigned.slice();
    let salary = lineup.reduce((s, p) => s + p.salary, 0);
    const bySlot = {};
    needed.forEach(slot => {
      bySlot[slot] = unlockedPlayers
        .filter(p => !used.has(p.name) && p.positions.includes(slot))
        .sort((a, b) => playerObjective(b, weights, stackTeams, bringBackTeams) - playerObjective(a, weights, stackTeams, bringBackTeams))
        .slice(0, slot === "C" ? 10 : 12);
    });
    for (const slot of needed) {
      const candidates = bySlot[slot] || [];
      let picked = null;
      const remaining = needed.length - lineup.filter(x => x.slot && needed.includes(x.slot)).length - 1;
      for (const p of candidates) {
        if (used.has(p.name)) continue;
        const nextSalary = salary + p.salary;
        const minNeed = remaining * 3500;
        if (nextSalary > RULES.SALARY_CAP) continue;
        if (nextSalary + minNeed > RULES.SALARY_CAP) continue;
        picked = p; break;
      }
      if (!picked) return null;
      used.add(picked.name);
      lineup.push({ ...picked, slot });
      salary += picked.salary;
    }
    if (salary < RULES.MIN_SALARY_USED || salary > RULES.SALARY_CAP) return null;
    if (needStack && !lineupHasStack(lineup, minStack)) return null;
    return lineup;
  }

  for (const assignment of lockedAssignments) {
    if (Date.now() - startedAt > TIME_BUDGET_MS && best.lineup) break;
    const used = new Set(assignment.assigned.map(p => p.name));
    const baseLineup = assignment.assigned.slice();
    const baseSalary = baseLineup.reduce((s, p) => s + p.salary, 0);
    const baseScore = baseLineup.reduce((s, p) => s + playerObjective(p, weights, stackTeams, bringBackTeams), 0);
    const uniqueOpenSlots = [...new Set(assignment.remainingSlots)];
    const slotCandidates = {};
    uniqueOpenSlots.forEach(slot => {
      const raw = unlockedPlayers
        .filter(p => !used.has(p.name) && p.positions.includes(slot))
        .map(p => ({ ...p, _slotObj: playerObjective(p, weights, stackTeams, bringBackTeams) }))
        .sort((a, b) => b._slotObj - a._slotObj);
      const cap = slot === "C" ? 8 : strategyType === "chalk" ? 10 : 11;
      slotCandidates[slot] = raw.slice(0, cap);
    });
    if (uniqueOpenSlots.some(slot => (slotCandidates[slot] || []).length === 0)) continue;
    const openSlots = assignment.remainingSlots.slice().sort((a, b) => (slotCandidates[a]?.length ?? 999) - (slotCandidates[b]?.length ?? 999));
    const slotMax = openSlots.map(slot => (slotCandidates[slot]?.[0]?._slotObj) || 0);
    const suffixUpper = new Array(openSlots.length + 1).fill(0);
    for (let i = openSlots.length - 1; i >= 0; i--) suffixUpper[i] = suffixUpper[i + 1] + slotMax[i];
    let timedOut = false;
    function dfs(idx, lineup, salary, score) {
      if (Date.now() - startedAt > TIME_BUDGET_MS) { timedOut = true; return; }
      if (idx === openSlots.length) {
        if (salary < RULES.MIN_SALARY_USED || salary > RULES.SALARY_CAP) return;
        if (needStack && !lineupHasStack(lineup, minStack)) return;
        if (score > best.score) best = { score, lineup: lineup.slice() };
        return;
      }
      if (score + suffixUpper[idx] < best.score) return;
      const slot = openSlots[idx];
      const cands = slotCandidates[slot] || [];
      const remaining = openSlots.length - idx - 1;
      const minNeed = remaining * 3500;
      for (const p of cands) {
        if (used.has(p.name)) continue;
        const nextSalary = salary + p.salary;
        if (nextSalary > RULES.SALARY_CAP) continue;
        if (nextSalary + minNeed > RULES.SALARY_CAP) continue;
        used.add(p.name); lineup.push({ ...p, slot });
        dfs(idx + 1, lineup, nextSalary, score + p._slotObj);
        lineup.pop(); used.delete(p.name);
        if (timedOut) return;
      }
    }
    dfs(0, baseLineup.slice(), baseSalary, baseScore);
    if (timedOut && !best.lineup) {
      const fallback = fastGreedy(assignment);
      if (fallback) {
        const fallbackScore = fallback.reduce((s, p) => s + playerObjective(p, weights, stackTeams, bringBackTeams), 0);
        if (fallbackScore > best.score) best = { score: fallbackScore, lineup: fallback };
      }
    }
  }
  return best.lineup;
}

function randn() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function simulateSlate(players, iterations = 240) {
  const sims = [];
  const games = {};
  players.forEach(p => { if (!games[p.game]) games[p.game] = { teams: {} }; games[p.game].teams[p.team] = true; });
  for (let i = 0; i < iterations; i++) {
    const env = {};
    Object.keys(games).forEach(game => { env[game] = { paceShock: randn() * 3.2, teamShock: {}, usageShock: {} }; });
    const outcome = {};
    for (const p of players) {
      const gameKey = p.game || "NA";
      if (!env[gameKey]) env[gameKey] = { paceShock: randn()*3.2, teamShock: {}, usageShock: {} };
      if (!(p.team in env[gameKey].teamShock)) env[gameKey].teamShock[p.team] = randn() * 1.8;
      if (!(p.team in env[gameKey].usageShock)) env[gameKey].usageShock[p.team] = randn() * 1.2;
      const mean = p.projMean ?? p.fppg ?? 0;
      const stdev = Math.min(15, p.stdev ?? Math.max(4.0, mean * 0.22));
      const paceEffect = env[gameKey].paceShock * 0.32;
      const teamEffect = env[gameKey].teamShock[p.team] * 0.28;
      const usageEffect = -env[gameKey].usageShock[p.team] * 0.15 + randn() * 0.5;
      const individualShock = randn() * stdev;
      const raw = mean + paceEffect + teamEffect + usageEffect + individualShock;
      outcome[p.name] = Math.max(0, raw);
    }
    sims.push(outcome);
  }
  return sims;
}

function scoreLineupAcrossSims(lineup, sims) {
  const totals = sims.map(sim => lineup.reduce((sum, p) => sum + (sim[p.name] || 0), 0)).sort((a, b) => a - b);
  const mean = totals.reduce((a, b) => a + b, 0) / Math.max(totals.length, 1);
  const p25 = totals[Math.floor(totals.length * 0.25)] ?? mean;
  const p75 = totals[Math.floor(totals.length * 0.75)] ?? mean;
  const p90 = totals[Math.floor(totals.length * 0.90)] ?? mean;
  const p99 = totals[Math.floor(totals.length * 0.99)] ?? mean;
  return { mean, p25, p75, p90, p99, totals };
}

function lineupMinUnique(a, b) {
  const setA = new Set(a.map(p => p.name));
  let shared = 0;
  b.forEach(p => { if (setA.has(p.name)) shared++; });
  return Math.max(0, 9 - shared);
}

function selectPortfolio(candidates, desiredCount, slateSize = 8) {
  const selected = [];
  const exposure = {};
  // [v5.7] Two-pass selection with clean exposure enforcement.
  // Pass 1 uses strict hardCap, pass 2 relaxes to relaxedCap if portfolio is short.
  // NO MORE safety-net fill that bypassed caps — that's what let Sharpe hit 100%.
  // Result: portfolio may be slightly smaller than requested on narrow slates,
  // which is the correct behavior (better 8 diverse lineups than 11 locked ones).
  const maxExposure = desiredCount <= 3 ? 0.67 : desiredCount <= 5 ? 0.65 : desiredCount <= 10 ? 0.60 : desiredCount <= 30 ? 0.50 : desiredCount <= 75 ? 0.40 : 0.33;
  const hardCap = Math.max(2, Math.floor(desiredCount * maxExposure));
  // Relaxed cap = absolute ceiling. At 75% of portfolio, still enforces diversity.
  const relaxedCap = Math.max(hardCap + 1, Math.ceil(desiredCount * 0.75));
  // [v5.8] Slate-aware diversity. Small slates force more unique players per pair.
  const minUnique = slateSize <= 3 ? 4 : slateSize <= 5 ? 3 : (desiredCount >= 15 ? 3 : 3);
  const sorted = [...candidates].sort((a, b) => (b._portfolioScore || 0) - (a._portfolioScore || 0));

  // Pass 1: strict hardCap enforcement
  for (const lu of sorted) {
    if (selected.length >= desiredCount) break;
    if (selected.some(existing => lineupMinUnique(existing, lu) < minUnique)) continue;
    if (lu.some(p => (exposure[p.name] || 0) + 1 > hardCap)) continue;
   // [v5.8] Strict cumulative-ownership cap for tournament lineups
    if (lu._type === "tournament" && lineupCumOwn(lu) > GPP_CUMOWN_STRICT) continue;
    selected.push(lu);
    lu.forEach(p => { exposure[p.name] = (exposure[p.name] || 0) + 1; });
  }

  // Pass 2: relax to relaxedCap — prefer least-similar lineups
  if (selected.length < desiredCount) {
    const remaining = sorted.filter(lu => !selected.includes(lu));
    remaining.sort((a, b) => {
      const simA = selected.length ? Math.max(...selected.map(s => 9 - lineupMinUnique(s, a))) : 0;
      const simB = selected.length ? Math.max(...selected.map(s => 9 - lineupMinUnique(s, b))) : 0;
      return simA - simB; // least similar first
    });
    // [v5.8.1] Pass 2 must also enforce minUnique (relaxed by 1, floor of 2)
    const relaxedMinUnique = Math.max(2, minUnique - 1);
    for (const lu of remaining) {
      if (selected.length >= desiredCount) break;
      if (lu.some(p => (exposure[p.name] || 0) + 1 > relaxedCap)) continue;
      if (selected.some(existing => lineupMinUnique(existing, lu) < relaxedMinUnique)) continue;
      selected.push(lu);
      lu.forEach(p => { exposure[p.name] = (exposure[p.name] || 0) + 1; });
    }
  }

  // Portfolio may be short if slate is too narrow — that's OK, user sees smaller count
  return selected.slice(0, desiredCount);
}

function lineupStats(lu) {
  return {
    total: lu.reduce((s, p) => s + p.salary, 0),
    proj: lu.reduce((s, p) => s + p.fppg, 0),
    avgOwn: lu.reduce((s, p) => s + p.ownership, 0) / lu.length,
    cumOwn: lu.reduce((s, p) => s + p.ownership, 0),
    chalk: lu.filter(p => p.ownership >= 30).length,
    mid: lu.filter(p => p.ownership >= 10 && p.ownership < 30).length,
    punt: lu.filter(p => p.ownership < 5).length,
    anchor: lu.reduce((best, p) => p.fppg > best.fppg ? p : best, lu[0]),
  };
}

function gradeSlate(gamesList) {
  if (!gamesList || gamesList.length === 0) return null;
  const totals = gamesList.map(g => g.total).filter(Boolean);
  const impliedPts = gamesList.flatMap(g => [g.homeImpl, g.awayImpl]).filter(Boolean);
  const avgTotal = totals.reduce((a,b) => a+b, 0) / totals.length;
  const highTotalGames = gamesList.filter(g => g.total >= 228).length;
  const maxImpl = Math.max(...impliedPts);
  let score = 0; let notes = [];
  if (gamesList.length >= 8) { score += 25; notes.push("[OK] Full 8-game slate"); }
  else if (gamesList.length >= 6) { score += 18; notes.push("[!] " + gamesList.length + " games - smaller"); }
  else if (gamesList.length >= 4) { score += 12; notes.push("[!] " + gamesList.length + " games - playoff/small"); }
  else { score += 5; notes.push("[NO] Only " + gamesList.length + " games - tiny"); }
  if (avgTotal >= 228) { score += 25; notes.push("[OK] Avg O/U " + avgTotal.toFixed(1)); }
  else if (avgTotal >= 222) { score += 15; notes.push("[!] Avg O/U " + avgTotal.toFixed(1)); }
  else { score += 5; notes.push("[NO] Low-scoring: " + avgTotal.toFixed(1)); }
  if (highTotalGames >= 3) { score += 25; notes.push("[OK] " + highTotalGames + " games 228+"); }
  else if (highTotalGames >= 1) { score += 15; notes.push("[!] " + highTotalGames + " game(s) 228+"); }
  else { score += 5; notes.push("[NO] No high-total games"); }
  if (maxImpl >= 122) { score += 25; notes.push("[OK] " + maxImpl + " implied - elite"); }
  else if (maxImpl >= 116) { score += 15; notes.push("[!] " + maxImpl + " max implied"); }
  else { score += 5; notes.push("[NO] Max implied " + maxImpl); }
  const grade = score >= 85 ? "A" : score >= 70 ? "B" : score >= 55 ? "C" : score >= 40 ? "D" : "F";
  const recommendation = score >= 85 ? "[HOT] MUST PLAY" : score >= 70 ? "[OK] PLAY - solid slate" : score >= 55 ? "[!] PLAY SMALL" : score >= 40 ? "[NO] SKIP OR MIN" : "[NO] SKIP";
  return { score, grade, notes, recommendation, playIt: score >= 55, highTotalGames, avgTotal, maxImpl };
}

// [v5.6] TOP 5 stack games (was 3) + pace bonus — fixes Apr 19 ORL@DET miss
// Fast-pace games deserve stacking even without a superstar on either roster
function getBestStackGames(gamesList, players) {
  if (!gamesList || gamesList.length === 0) return [];
  const scored = gamesList.map(g => {
    const gamePlayers = players.filter(p => p.team === g.home || p.team === g.away);
    const topPlayers = gamePlayers.sort((a,b) => b.fppg - a.fppg).slice(0,6);
    // [v5.6] Pace bonus — fast games deserve stacks even without top-heavy rosters.
    // ORL@DET scored 230+ total on Apr 19 but was outranked by games with bigger names.
    const total = g.total || 220;
    const paceBonus = total >= 232 ? 18 : total >= 228 ? 12 : total >= 224 ? 6 : 0;
    return { ...g, stackScore: total * 0.5 + topPlayers.reduce((s,p) => s+p.fppg, 0) * 0.3 + paceBonus, topPlayers };
  });
  // [v5.6] Top 5 (was 3) — broader stack rotation catches mid-tier pace games
  return scored.sort((a,b) => b.stackScore - a.stackScore).slice(0, 5);
}

function generateLineupsWithStrategy(players, count, lockedNames, excludedNames, gamesList, strategy) {
  if (!players || players.length === 0 || count <= 0) return [];
  // [v5.6] Top 5 stack games for rotation
  const bestGames = getBestStackGames(gamesList, players);
  const bestGame = bestGames[0] || null;

  const allCandidates = [];
  const used = new Set();
  let chalkCount, leverageCount, tournCount;
  if (strategy === "chalk") { chalkCount = count; leverageCount = 0; tournCount = 0; }
  else if (strategy === "leverage") { chalkCount = 0; leverageCount = count; tournCount = 0; }
  else if (strategy === "tournament") { chalkCount = 0; leverageCount = 0; tournCount = count; }
  else {
    chalkCount = Math.max(1, Math.round(count * 0.35));
    leverageCount = Math.max(1, Math.round(count * 0.35));
    tournCount = Math.max(0, count - chalkCount - leverageCount);
  }

  const startedAt = Date.now();
  const MAX_BUILD_MS = Math.min(8000, 1200 + count * 40);
  // [v5.6 tune] Small slates WANT stacks — correlation matters MORE with fewer games.
  // Only disable stack requirement when there's 1 game (no meaningful correlation available).
  const singleGameSlate = gamesList.length <= 1;
  const requireStack = !singleGameSlate && bestGames.length > 0;

  const buildBatch = (targetCount, type) => {
    const attempts = Math.max(targetCount * 10, 60);
    const perTypeTarget = Math.max(targetCount, Math.ceil(targetCount * 2.2));
    const minStack = (type === "tournament") ? 3 : 2;
    const candidateExposure = {};

    // [v5.7] Broader anchor rotation — rotate VALUE anchors not just salary anchors.
    // Old code only rotated $9k+ stars, which let Sharpe/Vassell at $4900 lock at 100%.
    // Now we rotate the top 8 highest-VALUE (FPPG/salary) players — stars AND value plays.
    const topAnchors = [...players]
      .filter(p => p.salary >= 4500 && !lockedNames.includes(p.name) && !excludedNames.includes(p.name))
      .sort((a, b) => (b.value || 0) - (a.value || 0))
      .slice(0, 8)
      .map(p => p.name);

    for (let attempt = 0; attempt < attempts; attempt++) {
      if (Date.now() - startedAt > MAX_BUILD_MS) break;
      if (allCandidates.filter(l => l._type === type).length >= perTypeTarget) break;

      const forcedExcludes = [...excludedNames];
      const genSoFar = allCandidates.filter(l => l._type === type).length;

      if (topAnchors.length > 0 && genSoFar >= 2) {
        const anchorExposure = topAnchors.map(n => ({ name: n, exp: (candidateExposure[n] || 0) / Math.max(genSoFar, 1) }));
        anchorExposure.sort((a, b) => b.exp - a.exp);
        const rotateIdx = attempt % Math.max(topAnchors.length, 3);
        const candidate = anchorExposure[rotateIdx % anchorExposure.length];
        if (candidate && candidate.exp > 0.45 && !lockedNames.includes(candidate.name)) {
          forcedExcludes.push(candidate.name);
        }
      }

      const gameIdx = bestGames.length > 1 ? (attempt % bestGames.length) : 0;
      const stackGame = bestGames[gameIdx] || bestGames[0];
      let stackTeams = [], bringBackTeams = [];
      if (stackGame) {
        const homeImpl = stackGame.homeImpl || LEAGUE_AVG_IMPLIED;
        const awayImpl = stackGame.awayImpl || LEAGUE_AVG_IMPLIED;
        if (homeImpl >= awayImpl) { stackTeams = [stackGame.home]; bringBackTeams = [stackGame.away]; }
        else { stackTeams = [stackGame.away]; bringBackTeams = [stackGame.home]; }
      }

      const pool = buildCandidatePool(players, lockedNames, forcedExcludes, stackTeams, bringBackTeams, type, attempt, candidateExposure, genSoFar).slice(0, 50);
      const lu = buildLineup(pool, lockedNames, forcedExcludes, type, stackTeams, bringBackTeams, requireStack, minStack);
      if (!lu || lu.length !== 9) continue;
     // [v5.8] Tournament leverage gate — must contain a sub-12% owned, value>=5 play
      if (type === "tournament" && !lineupHasLeverage(lu)) continue;
      const key = lineupKey(lu);
      if (used.has(key)) continue;
      used.add(key);
      lu._type = type;
      lu._hasStack = lineupHasStack(lu, minStack);
      lu._hasBringBack = lineupHasBringBack(lu, stackTeams, bringBackTeams);
      lu._stackGame = stackGame?.gameStr || null;
      allCandidates.push(lu);
      lu.forEach(p => { candidateExposure[p.name] = (candidateExposure[p.name] || 0) + 1; });
    }
  };

  if (chalkCount > 0) buildBatch(chalkCount, "chalk");
  if (leverageCount > 0) buildBatch(leverageCount, "leverage");
  if (tournCount > 0) buildBatch(tournCount, "tournament");

  // [v5.7.3] First fallback — retry without stack requirement (already existed)
  if (allCandidates.length === 0 && requireStack) {
    for (let attempt = 0; attempt < count * 6; attempt++) {
      const pool = buildCandidatePool(players, lockedNames, excludedNames, [], [], "mixed", attempt).slice(0, 42);
      const lu = buildLineup(pool, lockedNames, excludedNames, "mixed", [], [], false);
      if (!lu || lu.length !== 9) continue;
      const key = lineupKey(lu);
      if (used.has(key)) continue;
      used.add(key);
      lu._type = "mixed"; lu._hasStack = lineupHasStack(lu); lu._hasBringBack = false; lu._stackGame = null;
      allCandidates.push(lu);
    }
  }

  // [v5.7.4] EMERGENCY FALLBACK — rewritten to actually work.
  // v5.7.3 version picked top-score first, which exhausted budget after 5 expensive picks
  // and failed to find cheap enough fillers for remaining slots. Now we fill CHEAPEST-first
  // to guarantee salary feasibility, then UPGRADE slots to hit the MIN_SALARY_USED floor.
  if (allCandidates.length === 0) {
    const emergencyAttempts = Math.max(count * 8, 80);
    const pool = players.filter(p => !excludedNames.includes(p.name));
    for (let attempt = 0; attempt < emergencyAttempts; attempt++) {
      const slotsNeeded = ["C", "PG", "PG", "SG", "SG", "SF", "SF", "PF", "PF"];
      const used2 = new Set(lockedNames);
      const lineup = [];
      let salary = 0;
      let ok = true;

      // Step 1: Fill each slot with the CHEAPEST eligible player (with small randomization).
      // This guarantees we stay under the $60k cap at every step.
      for (const slot of slotsNeeded) {
        const candidates = pool
          .filter(p => !used2.has(p.name) && p.positions && p.positions.includes(slot))
          .map(p => ({ ...p, _pickScore: p.salary + (Math.random() - 0.5) * 800 })) // cheap first, slight noise
          .sort((a, b) => a._pickScore - b._pickScore)
          .slice(0, 6); // top 6 cheapest — adds variety across attempts
        if (!candidates.length) { ok = false; break; }
        const pick = candidates[Math.floor(Math.random() * candidates.length)];
        used2.add(pick.name);
        lineup.push({ ...pick, slot });
        salary += pick.salary;
      }
      if (!ok || lineup.length !== 9) continue;

      // Step 2: Upgrade slots until we hit MIN_SALARY_USED.
      // Replace cheapest players with more expensive same-position alternatives,
      // always staying under the $60k cap.
      let upgradeAttempts = 0;
      while (salary < RULES.MIN_SALARY_USED && upgradeAttempts < 30) {
        upgradeAttempts++;
        // Find the lineup slot that has the most expensive available upgrade
        let bestUpgrade = null;
        for (let i = 0; i < lineup.length; i++) {
          const current = lineup[i];
          const slot = current.slot;
          const budgetLeft = RULES.SALARY_CAP - salary + current.salary;
          const alternatives = pool.filter(p =>
            !used2.has(p.name) &&
            p.positions && p.positions.includes(slot) &&
            p.salary > current.salary &&
            p.salary <= budgetLeft
          );
          if (!alternatives.length) continue;
          // Pick the most expensive alternative that fits (biggest single-step upgrade)
          const bestAlt = alternatives.reduce((a, b) => b.salary > a.salary ? b : a);
          const deltaSalary = bestAlt.salary - current.salary;
          if (!bestUpgrade || deltaSalary > bestUpgrade.delta) {
            bestUpgrade = { idx: i, newPlayer: bestAlt, delta: deltaSalary };
          }
        }
        if (!bestUpgrade) break; // no upgrades available
        const oldPlayer = lineup[bestUpgrade.idx];
        used2.delete(oldPlayer.name);
        used2.add(bestUpgrade.newPlayer.name);
        lineup[bestUpgrade.idx] = { ...bestUpgrade.newPlayer, slot: oldPlayer.slot };
        salary += bestUpgrade.delta;
      }

      // Final validation
      if (salary < RULES.MIN_SALARY_USED || salary > RULES.SALARY_CAP) continue;
      const key = lineupKey(lineup);
      if (used.has(key)) continue;
      used.add(key);
      lineup._type = "emergency";
      lineup._hasStack = lineupHasStack(lineup);
      lineup._hasBringBack = false;
      lineup._stackGame = null;
      allCandidates.push(lineup);
      if (allCandidates.length >= count) break;
    }
  }

  // [v5.7.3] Expose internal counts for the status banner via a global hook
  if (typeof window !== "undefined") {
    window.__courtEdgeDebug = {
      bestGamesCount: bestGames.length,
      requireStack,
      totalCandidates: allCandidates.length,
      byType: {
        chalk: allCandidates.filter(l => l._type === "chalk").length,
        leverage: allCandidates.filter(l => l._type === "leverage").length,
        tournament: allCandidates.filter(l => l._type === "tournament").length,
        mixed: allCandidates.filter(l => l._type === "mixed").length,
        emergency: allCandidates.filter(l => l._type === "emergency").length,
      },
    };
  }

  if (allCandidates.length === 0) return [];

  const simIterations = Math.min(200, Math.max(80, 60 + count * 6));
  const sims = simulateSlate(players.slice(0, 70), simIterations);
  allCandidates.forEach(lu => {
    const simScore = scoreLineupAcrossSims(lu, sims);
    const stats = lineupStats(lu);
    lu._simMean = round1(simScore.mean);
    lu._simP25 = round1(simScore.p25);
    lu._simP75 = round1(simScore.p75);
    lu._simP90 = round1(simScore.p90);
    lu._simP99 = round1(simScore.p99);
    if (lu._type === "chalk") {
      lu._portfolioScore = simScore.mean * 0.55 + simScore.p25 * 0.35 + simScore.p75 * 0.10 - stats.avgOwn * 0.05;
    } else if (lu._type === "tournament") {
      lu._portfolioScore = simScore.mean * 0.18 + simScore.p90 * 0.35 + simScore.p99 * 0.42 + (lu._hasBringBack ? 3.0 : 0) + (lu._hasStack ? 2.5 : 0) - stats.avgOwn * 0.10;
    } else {
      lu._portfolioScore = simScore.mean * 0.40 + simScore.p75 * 0.25 + simScore.p90 * 0.25 + (lu._hasStack ? 2.0 : 0) + (lu._hasBringBack ? 1.5 : 0) - stats.avgOwn * 0.08;
    }
  });
  // [v5.7.3] Run portfolio selection, then apply last-resort fallback if it rejected everything
 // [v5.8.1] Pass slate size so selectPortfolio can calibrate minUnique
  const slateSize = gamesList ? gamesList.length : 8;
  let selected = selectPortfolio(allCandidates, count, slateSize);
  if (selected.length === 0 && allCandidates.length > 0) {
    // [v5.8.1] Rescue fallback now enforces diversity instead of slicing blindly.
    // Was producing clone lineups when Pass 1+2 both returned empty on small slates.
    const sortedRescue = [...allCandidates].sort((a, b) => (b._portfolioScore || 0) - (a._portfolioScore || 0));
    const rescueMinUnique = slateSize <= 3 ? 3 : 2;
    const rescued = [];
    for (const lu of sortedRescue) {
      if (rescued.length >= count) break;
      if (rescued.some(existing => lineupMinUnique(existing, lu) < rescueMinUnique)) continue;
      rescued.push(lu);
    }
    selected = rescued;
    if (typeof window !== "undefined" && window.__courtEdgeDebug) {
      window.__courtEdgeDebug.diversityRescue = selected.length;
      window.__courtEdgeDebug.rescueMinUnique = rescueMinUnique;
    }
  }
  return selected.sort((a, b) => (b._portfolioScore || 0) - (a._portfolioScore || 0));
}

function applyCascades(outPlayers, ownershipMap, cascadeRules) {
  const newMap = { ...ownershipMap };
  const log = [];
  for (const outName of outPlayers) {
    const rules = cascadeRules.filter(r => r.trigger.toLowerCase() === outName.toLowerCase());
    for (const rule of rules) {
      for (const b of rule.beneficiaries) {
        const key = b.name.toLowerCase();
        const current = newMap[key] ?? 15;
        const boosted = Math.min(65, +((current * (b.ownBoost || 1)).toFixed(1)));
        newMap[key] = boosted;
        log.push({ out: outName, player: b.name, from: current, to: boosted, projBoost: b.projBoost || 1, note: b.note });
      }
    }
  }
  return { newMap, log };
}

function buildLineupRows(lineups) {
  const rows = [];
  for (const lu of lineups) {
    const bySlot = { PG: [], SG: [], SF: [], PF: [], C: [] };
    lu.forEach(p => { if (bySlot[p.slot]) bySlot[p.slot].push(p); });
    const ordered = [
      bySlot.PG[0], bySlot.PG[1],
      bySlot.SG[0], bySlot.SG[1],
      bySlot.SF[0], bySlot.SF[1],
      bySlot.PF[0], bySlot.PF[1],
      bySlot.C[0]
    ];
    if (ordered.some(p => !p)) {
      console.warn("Skipping lineup — missing slot:", lu.map(p=>p.slot+":"+p.name).join(", "));
      continue;
    }
    rows.push(ordered.map(p => p.fdId || "").join(","));
  }
  return rows;
}

function exportLineupsToFanDuel(lineups) {
  const header = "PG,PG,SG,SG,SF,SF,PF,PF,C";
  const rows = buildLineupRows(lineups);
  return header + "\r\n" + rows.join("\r\n");
}

function exportLineupsToFanDuelTemplate(lineups, contestName = "", contestId = "", entryFee = "") {
  const header = "Entry ID,Contest Name,Contest ID,Entry Fee,PG,PG,SG,SG,SF,SF,PF,PF,C";
  const rows = buildLineupRows(lineups);
  const dataRows = rows.map(r => `,${contestName},${contestId},${entryFee},${r}`);
  return header + "\r\n" + dataRows.join("\r\n");
}
function downloadCSV(csvText, filename) {
  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csvText], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function DvPPanel({ games, dvpMap, onUpdate }) {
  const teams = [];
  games.forEach(g => { if(!teams.includes(g.home)) teams.push(g.home); if(!teams.includes(g.away)) teams.push(g.away); });
  const positions = ["PG","SG","SF","PF","C"];
  const gradeColor = (val, pos) => {
    if (!val || val <= 0) return "#3b6280";
    const base = LEAGUE_AVG_DVP[pos] || 41;
    const ratio = val / base;
    if (ratio >= 1.10) return "#22c55e";
    if (ratio >= 1.05) return "#86efac";
    if (ratio >= 0.95) return "#94a3b8";
    if (ratio >= 0.90) return "#f59e0b";
    return "#ef4444";
  };
  const gradeLabel = (val, pos) => {
    if (!val || val <= 0) return "-";
    const base = LEAGUE_AVG_DVP[pos] || 41;
    const ratio = val / base;
    if (ratio >= 1.10) return "A";
    if (ratio >= 1.05) return "B";
    if (ratio >= 0.95) return "C";
    if (ratio >= 0.90) return "D";
    return "F";
  };
  const updateDvP = (team, pos, val) => {
    const next = { ...dvpMap, [team]: { ...(dvpMap[team] || {}), [pos]: parseFloat(val) || 0 } };
    onUpdate(next);
  };
  if (!teams.length) return (
    <div style={{ padding: 16, textAlign: "center", color: "#4a6a80", fontSize: 11, background: "#0a1520", borderRadius: 8 }}>

              {positions.map(pos => {
                const val = dvpMap[team]?.[pos] || "";
                const gc = val ? gradeColor(parseFloat(val), pos) : "#3b6280";
                const gl = val ? gradeLabel(parseFloat(val), pos) : "-";

                  <td key={pos} style={{ padding: "4px 6px", textAlign: "center" }}>

                      <input
                        type="number"

                        placeholder={String(LEAGUE_AVG_DVP[pos])}
                        onChange={e => updateDvP(team, pos, e.target.value)}
                        style={{ width: 52, background: "#0d1e2e", border: `1px solid ${gc}55`, color: "#e2e8f0", borderRadius: 4, padding: "3px 5px", fontSize: 11, fontFamily: "inherit", textAlign: "center" }}
                      />
                      <span style={{ fontSize: 9, fontWeight: 700, color: gc, minWidth: 12 }}>{gl}</span>
                    </div>
                  </td>

            </tr>
          ))}
        </tbody>
      </table>
      <div style={{ marginTop: 10, display: "flex", gap: 12, fontSize: 9, color: "#4a6a80" }}>
        {[["A","#22c55e","≥110%"],["B","#86efac","105-110%"],["C","#94a3b8","95-105%"],["D","#f59e0b","90-95%"],["F","#ef4444","<90%"]].map(([g,c,r])=>(
          <span key={g}><span style={{color:c,fontWeight:700}}>{g}</span> {r} of avg</span>
        ))}
      </div>
    </div>
  );
}

function Tip({ text, children, wide = false }) {
  const [show, setShow] = React.useState(false);
  const [pos, setPos] = React.useState({ x: 0, y: 0 });
  return (
    <span
      style={{ position: "relative", display: "inline-block", cursor: "help" }}
      onMouseEnter={e => { setShow(true); setPos({ x: e.clientX, y: e.clientY }); }}
      onMouseMove={e => setPos({ x: e.clientX, y: e.clientY })}
      onMouseLeave={() => setShow(false)}
    >
      {children}
      {show && (
        <div style={{
          position: "fixed",
          left: Math.min(pos.x + 12, window.innerWidth - (wide ? 320 : 220)),
          top: pos.y - 8,
          zIndex: 99999,
          background: "#0d1e2e",
          border: "1px solid #3b82f6",
          borderRadius: 8,
          padding: "8px 12px",
          fontSize: 11,
          color: "#e2e8f0",
          maxWidth: wide ? 320 : 210,
          lineHeight: 1.6,
          pointerEvents: "none",
          boxShadow: "0 8px 24px rgba(0,0,0,0.6)",
        }}>
          {text}
        </div>
      )}
    </span>
  );
}

  }, [vegasMap, cascadeRules, dvpMap, playoffMode]);

  const handleCSV = useCallback((text) => {
    setCsvText(text);
    const defaultOwn = {};
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/\s+/g, ""));
    const nickIdx = headers.indexOf("nickname");

    // [v5.7.1] Auto-extract games from CSV — THIS WAS THE ROOT CAUSE BUG.
    // Previously games only came from Odds API or manual entry, so uploading a new
    // CSV left stale games from prior slate, which broke stack detection and often
    // resulted in zero lineups generated. CSV Game column has format "AWAY@HOME".
    const csvGamesSet = new Set();
    if (gameIdx >= 0) {
      lines.slice(1).forEach(line => {
        const cols = line.split(",");
        const g = (cols[gameIdx] || "").trim();

    const autoInjuries = [];
    const autoExcluded = [];
    lines.slice(1).forEach(line => {
      const cols = line.split(",");

      defaultOwn[name.toLowerCase()] = 15;

        if (inj === "O") autoExcluded.push(name);

    });

    if (autoInjuries.length > 0) {
      setInjuries(autoInjuries);
      setExcludedNames(autoExcluded);
    }

    // [v5.7.1] Set games BEFORE rebuilding players so projections use fresh vegas context
    if (csvGames.length > 0) setGames(csvGames);

    setOwnershipMap(defaultOwn);
    rebuildPlayers(text, defaultOwn, {}, autoExcluded);
    setStatMuseMap({});
    // Use csvGames (fresh) not games (stale) for the ownership estimation check
    const effectiveGames = csvGames.length > 0 ? csvGames : games;
    if (effectiveGames.length > 0) {
      // Build a temporary vegasMap from csvGames since state setters are async
      const tempVegas = {};
      effectiveGames.forEach(g => {
        const homeImpl = (g.total / 2) - (g.homeSpread / 2);
        const awayImpl = (g.total / 2) + (g.homeSpread / 2);
        tempVegas[g.home] = { total: g.total, impliedPts: homeImpl, spread: g.homeSpread, moneyline: g.homeML, opponent: g.away, gameStr: `${g.away}@${g.home}`, isHome: true };
        tempVegas[g.away] = { total: g.total, impliedPts: awayImpl, spread: -g.homeSpread, moneyline: g.awayML, opponent: g.home, gameStr: `${g.away}@${g.home}`, isHome: false };
      });

      const newOwn = { ...defaultOwn };

  }, [rebuildPlayers, excludedNames, games, vegasMap, cascadeRules, dvpMap, playoffMode]);

  const handleFile = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => handleCSV(ev.target.result); reader.readAsText(file); };
  const updateOwnership = (name, val) => { const key = name.toLowerCase(); const newMap = { ...ownershipMap, [key]: val }; setOwnershipMap(newMap); rebuildPlayers(csvText, newMap, statMuseMap, excludedNames); };
  const handleStatMuseManual = (name, fdAvg) => { const key = name.toLowerCase(); const newSM = { ...statMuseMap, [key]: { fdAvg, lastGame: null, trend: "neutral" } }; setStatMuseMap(newSM); rebuildPlayers(csvText, ownershipMap, newSM, excludedNames); };

      const res = await fetch(url);

      const newGames = [];
      for (const game of data) {

        const abbr = (name) => {
          const map = { "Oklahoma City Thunder":"OKC","Boston Celtics":"BOS","San Antonio Spurs":"SA","Portland Trail Blazers":"POR","Philadelphia 76ers":"PHI","Orlando Magic":"ORL","Phoenix Suns":"PHO","Detroit Pistons":"DET","Miami Heat":"MIA","Milwaukee Bucks":"MIL","Denver Nuggets":"DEN","Los Angeles Lakers":"LAL","Los Angeles Clippers":"LAC","Golden State Warriors":"GSW","Dallas Mavericks":"DAL","Memphis Grizzlies":"MEM","New Orleans Pelicans":"NOP","Minnesota Timberwolves":"MIN","Sacramento Kings":"SAC","Utah Jazz":"UTA","Houston Rockets":"HOU","Atlanta Hawks":"ATL","Chicago Bulls":"CHI","Cleveland Cavaliers":"CLE","Indiana Pacers":"IND","Brooklyn Nets":"BKN","New York Knicks":"NYK","Toronto Raptors":"TOR","Washington Wizards":"WAS","Charlotte Hornets":"CHA" };

        const homeAbbr = abbr(home); const awayAbbr = abbr(away);

        newGames.push({ home: homeAbbr, away: awayAbbr, total, homeSpread, homeML, awayML });

  // [v5.7.2] Helper: extract games from the currently-loaded CSV.
  // Used as a safety-net if games state is empty when Generate is clicked.
  const extractGamesFromCSV = useCallback((text) => {
    if (!text) return [];
    const lines = text.trim().split("\n");
    if (lines.length < 2) return [];
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/\s+/g, ""));
    const gameIdx = headers.indexOf("game");
    if (gameIdx < 0) return [];
    const gameSet = new Set();
    lines.slice(1).forEach(line => {
      const cols = line.split(",");
      const g = (cols[gameIdx] || "").trim();
      if (g && g.includes("@")) gameSet.add(g);
    });
    const out = [];
    gameSet.forEach(gs => {
      const [away, home] = gs.split("@").map(s => s.trim());
      if (away && home) out.push({ home, away, total: LEAGUE_AVG_TOTAL, homeSpread: 0, homeML: -110, awayML: -110 });

  const handleGenerate = () => {

    // Safety net: if games state is somehow empty but we have CSV, auto-extract now

    if (effectiveGames.length === 0) {
      setGenStatus("❌ No games in slate. Upload a CSV or add games in the SLATE tab.");

    setGenStatus(`🔄 Generating ${lineupCount} lineups from ${players.length} players across ${effectiveGames.length} games (playoff mode ${playoffMode ? "ON" : "OFF"})...`);

    requestAnimationFrame(() => {
      try {
        const safeCount = Math.max(1, Math.min(lineupCount || 20, 150));

        const arr = Array.isArray(lus) ? lus : [];
