function qnetPredict(state) {
    // numpy-style matmul for the 3-layer network
    function relu(arr) { return arr.map(x => Math.max(0, x)); }
    function matmul(x, W) {
        return W[0].map((_, j) => x.reduce((sum, xi, i) => sum + xi * W[i][j], 0));
    }
    function addBias(arr, b) { return arr.map((v, i) => v + b[i]); }
    const z1 = addBias(matmul(state, Q_WEIGHTS.W1), Q_WEIGHTS.b1);
    const a1 = relu(z1);
    const z2 = addBias(matmul(a1, Q_WEIGHTS.W2), Q_WEIGHTS.b2);
    const a2 = relu(z2);
    const z3 = addBias(matmul(a2, Q_WEIGHTS.W3), Q_WEIGHTS.b3);
    return z3; // [q_skip, q_add]
}

function mlScorePlayer(p, remainingSalary, slotsFilledCount, lineupFpSoFar) {
    // Build state vector matching training features
    const salaryNorm    = (p.salary - 3500) / (13000 - 3500);
    const fppgNorm      = (p.fppg - 10) / (70 - 10);
    const sampleQ       = Math.min(p.played / 60.0, 1.0);
    const value         = p.fppg / (p.salary / 1000);
    const valueNorm     = (value - 2.0) / (8.0 - 2.0);
    const posEnc        = {'PG':0,'SG':1,'SF':2,'PF':3,'C':4}[p.positions[0]] ?? 2;
    const injured       = p.injuryStatus === 'OUT' ? 1 : 0;
    const salaryTier    = p.salary >= 10000 ? 3 : p.salary >= 7000 ? 2 : p.salary >= 5000 ? 1 : 0;
    const LINEUP_SIZE   = 9;
    const SALARY_CAP    = 60000;
    const state = [
        remainingSalary / SALARY_CAP,
        slotsFilledCount / LINEUP_SIZE,
        lineupFpSoFar / (LINEUP_SIZE * 30 + 1),
        salaryNorm,
        fppgNorm,
        posEnc / 4.0,
        valueNorm,
        fppgNorm, // pred_fp proxy — actual pred needs full scaler, use fppg as proxy
    ];
    const qVals = qnetPredict(state);
    // Return Q-value for "add" action — higher = model wants this player
    return qVals[1];
}

const POSITIONS_TO_FETCH = ["PG","SG","SF","PF","C"];
async function fetchDVPForPosition(pos, platform) {
    const site = platform === "DK" ? "draftkings" : "fanduel";
    const url = `https://www.fantasypros.com/daily-fantasy/nba/${site}-defense-vs-position.php`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error("DVP fetch failed");
    const html = await res.text();
    // Parse table rows: each row = one team's stats for this view
    // Table columns: Team | GP | PTS | REB | AST | 3PM | STL | BLK | TO | FD PTS
    const rowRegex = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
    const cellRegex = /<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi;
    const stripTags = s => s.replace(/<[^>]+>/g,"").replace(/&amp;/g,"&").replace(/&nbsp;/g," ").trim();
    const results = {};
    let match;
    while ((match = rowRegex.exec(html)) !== null) {
        const row = match[1];
        const cells = [];
        let cm;
        while ((cm = cellRegex.exec(row)) !== null) cells.push(stripTags(cm[1]));
        if (cells.length < 9) continue;
        // First cell contains team name (may include abbreviation)
        const teamRaw = cells[0].toLowerCase()
            .replace(/\n/g," ").replace(/\s+/g," ").trim()
            // Remove the abbreviated prefix like "ATL" from "ATLAtlanta Hawks"
            .replace(/^[a-z]{2,4}(?=[a-z])/,"");
        const abbr = FP_TEAM_MAP[teamRaw] || Object.entries(FP_TEAM_MAP).find(([k])=>teamRaw.includes(k.split(" ")[0]))?.[1];
        if (!abbr) continue;
        const fdPts = parseFloat(cells[cells.length-1]);
        const pts   = parseFloat(cells[2]);
        const reb   = parseFloat(cells[3]);
        const ast   = parseFloat(cells[4]);
        if (isNaN(fdPts) || fdPts <= 0) continue;
        results[abbr] = { fdPts, pts, reb, ast };
    }
    return results; // { "ATL": { fdPts, pts, reb, ast }, ... }
}
// Convert raw FD pts allowed → grade + multipliers
function buildDVPMaps(dvpByPos) {
    // dvpByPos = { PG: { ATL:{fdPts,pts,reb,ast}, ... }, SG: {...}, ... }
    const newPosDef = {};
    const newStatDef = {};
    for (const pos of POSITIONS_TO_FETCH) {
        const posData = dvpByPos[pos];
        if (!posData || Object.keys(posData).length === 0) continue;
        const values = Object.values(posData).map(v => v.fdPts).filter(v => !isNaN(v));
        if (!values.length) continue;
        const avg   = values.reduce((a,b)=>a+b,0)/values.length;
        const sorted = [...values].sort((a,b)=>a-b);
        const p25 = sorted[Math.floor(sorted.length*0.25)];
        const p75 = sorted[Math.floor(sorted.length*0.75)];
        for (const [team, data] of Object.entries(posData)) {
            if (!newPosDef[team]) newPosDef[team] = {};
            if (!newStatDef[team]) newStatDef[team] = { pts:1.0, reb:1.0, ast:1.0, _count:0 };
            // Grade: A = top 25% pts allowed (easiest), D = bottom 25% (hardest)
            const grade = data.fdPts >= p75 ? "A"
                        : data.fdPts >= avg  ? "B"
                        : data.fdPts >= p25  ? "C" : "D";
            newPosDef[team][pos] = grade;
            // Multiplier: actual/avg (capped 0.80–1.25)
            const mult = Math.min(1.25, Math.max(0.80, data.fdPts / avg));
            // Average stat multipliers across all positions for PRA projections
            const ptsAvg = Object.values(posData).map(v=>v.pts).reduce((a,b)=>a+b,0)/Object.keys(posData).length;
            const rebAvg = Object.values(posData).map(v=>v.reb).reduce((a,b)=>a+b,0)/Object.keys(posData).length;
            const astAvg = Object.values(posData).map(v=>v.ast).reduce((a,b)=>a+b,0)/Object.keys(posData).length;
            newStatDef[team].pts  = +(newStatDef[team].pts + (data.pts/ptsAvg)).toFixed(3);
            newStatDef[team].reb  = +(newStatDef[team].reb + (data.reb/rebAvg)).toFixed(3);
            newStatDef[team].ast  = +(newStatDef[team].ast + (data.ast/astAvg)).toFixed(3);
            newStatDef[team]._count++;
        }
    }
    // Average stat multipliers across all fetched positions
    for (const team of Object.keys(newStatDef)) {
        const n = newStatDef[team]._count || 1;
        newStatDef[team].pts = +((newStatDef[team].pts - 1.0) / n + 1.0).toFixed(3);
        newStatDef[team].reb = +((newStatDef[team].reb - 1.0) / n + 1.0).toFixed(3);
        newStatDef[team].ast = +((newStatDef[team].ast - 1.0) / n + 1.0).toFixed(3);
        delete newStatDef[team]._count;
    }
    return { newPosDef, newStatDef };
}

    const dvpByPos = {};
    for (const { pos, data } of results) dvpByPos[pos] = data;
    return dvpByPos;
}

// Pace multiplier — games above slate avg pace boost all stats slightly
function getPaceMultiplier(gamePace) {
    const delta = gamePace - SLATE_AVG_PACE;
    return 1.0 + (delta * 0.008); // ~0.8% per pace point above avg
}
// Calculate tonight's PRA projection for a player
function calcPRAProjection(playerName, opponentTeam, gamePace, injuryStatus) {
    const base = PLAYER_PRA_BASE[playerName.toLowerCase()];
    if (!base) return null;
    const def = TEAM_DEF_VS_STAT[opponentTeam] || { pts:1.0, reb:1.0, ast:1.0 };
    const paceM = getPaceMultiplier(gamePace || SLATE_AVG_PACE);
    // Injury modifier — Q players get slight reduction
    const injM = injuryStatus === "Q" ? 0.92 : 1.0;
    const pts  = +(base.pts  * def.pts  * paceM * injM).toFixed(1);
    const reb  = +(base.reb  * def.reb  * paceM * injM).toFixed(1);
    const ast  = +(base.ast  * def.ast  * paceM * injM).toFixed(1);
    const pra  = +(pts + reb + ast).toFixed(1);
    // Confidence: HIGH if gp>=50 + opponent in our DB + no injury
    //             MED if gp>=35 or opponent missing or Q
    //             LOW otherwise
    const hasOpp = !!TEAM_DEF_VS_STAT[opponentTeam];
    // _dvpLive is set globally when live DVP fetch completes — lifts confidence
    const dvpLive = typeof _dvpLive !== "undefined" && _dvpLive;
    const conf = (base.gp >= 50 && hasOpp && injuryStatus !== "Q" && dvpLive) ? "HIGH"
               : (base.gp >= 50 && hasOpp && injuryStatus !== "Q") ? "MED"
               : (base.gp >= 35 && hasOpp) ? "MED" : "LOW";
    const basePRA = +(base.pts + base.reb + base.ast).toFixed(1);
    const delta   = +(pra - basePRA).toFixed(1);
    return { pts, reb, ast, pra, conf, delta, basePRA };
}

// Compares current ESPN injury data to saved snapshot at generate time
function detectLateSwaps(currentInjuries, snapshotOuts, lineups, players) {

        .filter(p => p.status === "OUT")
        .map(p => p.name)
        .filter(n => !snapshotOuts.includes(n));

    const affectedLineups = [];
    for (let i = 0; i < lineups.length; i++) {
        const lu = lineups[i];
        const hits = lu.filter(p => newOuts.includes(p.name));
        if (hits.length > 0) affectedLineups.push({ idx: i, players: hits });
    }

    // ── SWAP SUGGESTIONS — best available replacement per scratched player ──
    const swapSuggestions = {};
    const usedInLineups = new Set(lineups.flatMap(lu => lu.map(p => p.name)));
    for (const outName of newOuts) {
        // Find the original player across all lineups to get their slot/position
        let origPos = null;
        let origSal = 60000;
        for (const lu of lineups) {
            const hit = lu.find(p => p.name === outName);
            if (hit) { origPos = hit.slot; origSal = hit.salary; break; }
        }
        if (!origPos) continue;
        // Candidates: in player pool, not out, not already widely used, can fill that slot
        const candidates = players
            .filter(p =>
                !newOuts.includes(p.name) &&
                !snapshotOuts.includes(p.name) &&
                p.injury !== "OUT" && p.injury !== "O" &&
                (p.positions.includes(origPos) || p.positions.includes("UTIL") || p.positions.includes("G") || p.positions.includes("F")) &&
                p.salary <= origSal + 800

            .sort((a, b) => b.score - a.score)
            .slice(0, 3);
        swapSuggestions[outName] = { slot: origPos, suggestions: candidates };
    }

            mvpP.score = compositeScore(mvpP);
            players.push(mvpP);
            const starP = { ...p, fppg: +(baseFppg * RULES.starMult).toFixed(2), salary: Math.round(salary * 1.25), positions: ["STAR"], _baseName: name };
            starP.score = compositeScore(starP);
            players.push(starP);
        }
    }
    return players.sort((a, b) => b.score - a.score);
}
// ── CSV EXPORT ───────────────────────────────────────────────────────────
function exportLineupsCSV(lineups, platform) {
    if (!lineups || lineups.length === 0) return;
    const isFD = platform === "FD" || platform === "FD_SD";
    const isSD = platform === "DK_SD" || platform === "FD_SD";

    // Classic FD slot order: PG,PG,SF,SF,PF,PF,C,SG,SG (9 slots)
    // Classic DK slot order: PG,SG,SF,PF,C,G,F,UTIL (8 slots)
    // DK Showdown: CPT,FLEX,FLEX,FLEX,FLEX,FLEX (6 slots) — exports as player names
    // FD Showdown: MVP,STAR,PRO,UTIL,UTIL (5 slots)
    const slotOrder = platform === "FD_SD"
        ? ["MVP","STAR","PRO","UTIL","UTIL","UTIL"]
        : platform === "DK_SD"
        ? ["CPT","FLEX","FLEX","FLEX","FLEX","FLEX"]
        : isFD
        ? ["PG","PG","SG","SG","SF","SF","PF","PF","C"]
        : ["PG","SG","SF","PF","C","G","F","UTIL"];

    const header = slotOrder.join(",");
    const rows = [header];

    for (const lu of lineups) {
        // Build slot→player map
        const slotMap = {};
        for (const p of lu) {
            if (!slotMap[p.slot]) slotMap[p.slot] = [];
            slotMap[p.slot].push(p);
        }
        // Fill each slot in order — use ID if available, else name
        const usedNames = new Set();
        const cells = slotOrder.map(slot => {
            const candidates = slotMap[slot] || [];
            const p = candidates.find(c => !usedNames.has(c.name));
            if (p) {
                usedNames.add(p.name);
                // FD upload requires player ID; DK upload accepts player Name
                return (isFD && p.id) ? p.id : p.name;
            }
            return "";
        });
        rows.push(cells.join(","));
    }

    const csv = rows.join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `court_edge_${platform}_lineups_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

// ── LINEUP ENGINE ────────────────────────────────────────────────────────
function buildLineup(players, lockedNames = [], excludedNames = []) {
    // Separate locked from pool
    const locked = players.filter(p => lockedNames.includes(p.name));
    const pool = players.filter(p => !excludedNames.includes(p.name) && !lockedNames.includes(p.name));
    // Roster slots from current platform config
    const needed = Object.assign({}, RULES.POSITIONS);
    const lineup = [];
    const used = new Set();
    let budget = RULES.SALARY_CAP;
    const MAX_PER_TEAM = 4;
    const teamCount = () => {
        const counts = {};
        for (const p of lineup) counts[p.team] = (counts[p.team] || 0) + 1;
        return counts;
    };
    const place = (p, pos) => {
        needed[pos]--;
        lineup.push(Object.assign(Object.assign({}, p), { slot: pos }));
        used.add(p.name);
        // In showdown mode, also mark the player's base name as used
        // so the same player can't appear in both CPT and FLEX
        if (p._baseName) used.add("__base__" + p._baseName);
        budget -= p.salary;
    };
    const canPlace = (p) => {
        const counts = teamCount();
        if ((counts[p.team] || 0) >= MAX_PER_TEAM) return false;
        // Showdown: prevent same real player in CPT+FLEX slots
        if (p._baseName && used.has("__base__" + p._baseName)) return false;
        return true;
    };
    // 1. Place locked players
    for (const p of locked) {
        for (const pos of p.positions) {
            if ((needed[pos] || 0) > 0 && canPlace(p)) {
                place(p, pos);
                break;
            }
        }
    }
    // 2. Greedy fill: iterate pool in given order, place each player in first available slot
    //    Budget guard: dynamic — uses actual pool min salary (handles DK Showdown $1K players)
    const poolMinSal = pool.length ? Math.min(...pool.map(p => p.salary)) : 3500;
    for (const p of pool) {
        if (used.has(p.name))
            continue;
        const slotsLeft = Object.values(needed).reduce((a, b) => a + b, 0);
        if (slotsLeft === 0)
            break;
        for (const pos of p.positions) {
            if ((needed[pos] || 0) > 0) {
                const budgetAfter = budget - p.salary;
                const minNeeded = (slotsLeft - 1) * poolMinSal;
                if (budgetAfter >= minNeeded && canPlace(p)) {
                    place(p, pos);
                    break;
                }
            }
        }
    }
    // 3. If any slots still open, fill with cheapest eligible players regardless of score
    if (Object.values(needed).reduce((a, b) => a + b, 0) > 0) {
        const cheap = [...pool].filter(p => !used.has(p.name)).sort((a, b) => a.salary - b.salary);
        for (const p of cheap) {
            const slotsLeft = Object.values(needed).reduce((a, b) => a + b, 0);
            if (slotsLeft === 0)
                break;
            for (const pos of p.positions) {
                if ((needed[pos] || 0) > 0 && budget - p.salary >= 0 && canPlace(p)) {
                    place(p, pos);
                    break;
                }
            }
        }
    }
    return lineup.length === RULES.LINEUP_SIZE ? lineup : null;
}
// ── OPTIMIZER SETTINGS (read from UI sliders) ────────────────────────────
function getOptimizerSettings() {
    return {
        // randomness: 0-25 — how much projection variance to inject
        // 0 = pure chalk, 25 = high GPP variance
        randomnessPct: parseFloat(document.getElementById('randomness-slider')?.value ?? 8),
        // numUniques: min players that must differ between any two lineups
        // chanzer0/NBA-DFS-Tools approach
        numUniques: parseInt(document.getElementById('uniques-slider')?.value ?? 2),
        // maxExposure: max % of lineups any single player can appear in
        maxExposurePct: parseFloat(document.getElementById('exposure-slider')?.value ?? 40),
    };
}

// Apply randomness to projections — inject per-player variance
// High randomness = more GPP ceiling plays, more lineup diversity
function applyRandomness(players, randomnessPct) {
    const r = randomnessPct / 100;
    return players.map(p => {
        // Variance is proportional to randomness setting
        // Higher-upside players (high fppg) get slightly more variance (GPP logic)
        const variance = r * (0.6 + Math.random() * 0.8);
        const direction = Math.random() < 0.5 ? 1 : -1;
        return { ...p, score: p.score * (1 + direction * variance) };
    });
}

// Check if two lineups differ by at least numUniques players
function meetsUniqueness(lineupA, lineupB, numUniques) {
    const namesA = new Set(lineupA.map(p => p.name));
    const namesB = new Set(lineupB.map(p => p.name));
    let diff = 0;
    for (const n of namesA) if (!namesB.has(n)) diff++;
    return diff >= numUniques;
}

// Check lineup against all existing lineups for uniqueness
function passesUniquenessCheck(newLineup, existingLineups, numUniques) {
    if (numUniques <= 0) return true;
    return existingLineups.every(lu => meetsUniqueness(newLineup, lu, numUniques));
}

// Track exposure — how many lineups each player appears in
function getExposureMap(lineups) {
    const map = {};
    lineups.forEach(lu => {
        lu.forEach(p => { map[p.name] = (map[p.name] || 0) + 1; });
    });
    return map;
}

function generateLineups(players, count, lockedNames, excludedNames) {
    const { randomnessPct, numUniques, maxExposurePct } = getOptimizerSettings();
    const lineups = [];
    const usedKeys = new Set();
    // Scale attempts: more lineups = more attempts needed
    const maxAttempts = Math.max(count * 200, 25000);
    const maxExposureCount = Math.ceil((maxExposurePct / 100) * count);

    for (let attempt = 0; attempt < maxAttempts && lineups.length < count; attempt++) {
        // Progressive uniqueness relaxation — if we're struggling to fill,
        // gradually relax uniqueness requirement (never below 1)
        const fillPct = lineups.length / count;
        const effectiveUniques = fillPct < 0.7
            ? numUniques                          // full strictness for first 70%
            : fillPct < 0.88
                ? Math.max(1, numUniques - 1)     // relax by 1 for next 18%
                : 1;                              // minimum uniqueness for last 12%

        // 1. Apply randomness — varies projections each attempt
        const noised = applyRandomness(players, randomnessPct);

        // 2. Sort by noised score
        const varied = [...noised].sort((a, b) => b.score - a.score);

        // 3. Exposure cap — HARD BLOCK
        let filteredPool = varied;
        if (lineups.length >= 2) {
            const expMap = getExposureMap(lineups);
            filteredPool = varied.filter(p =>
                lockedNames.includes(p.name) ||
                (expMap[p.name] || 0) < maxExposureCount
            );
            if (filteredPool.length < RULES.LINEUP_SIZE + 3) {
                filteredPool = varied;
            }
        }

        const lu = buildLineup(filteredPool, lockedNames, excludedNames);
        if (!lu) continue;

        // 4. Deduplicate
        const key = lu.map(p => p.name).sort().join("|");
        if (usedKeys.has(key)) continue;

        // 5. Uniqueness check with progressive relaxation
        if (!passesUniquenessCheck(lu, lineups, effectiveUniques)) continue;

        usedKeys.add(key);
        lineups.push(lu);
    }
    return lineups;
}
function lineupStats(lu) {
    if (!lu || !Array.isArray(lu) || lu.length === 0)
        return {
            total: 0, proj: 0, avgOwn: 0, chalk: 0, mid: 0, punt: 0,
            anchor: { name: "—", fppg: 0 }
        };
    return {
        total: lu.reduce((s, p) => s + p.salary, 0),
        proj: lu.reduce((s, p) => s + p.fppg, 0),
        avgOwn: lu.reduce((s, p) => s + p.ownership, 0) / lu.length,
        chalk: lu.filter(p => p.ownership >= 30).length,
        mid: lu.filter(p => p.ownership >= 10 && p.ownership < 30).length,
        punt: lu.filter(p => p.ownership < 5).length,
        anchor: lu.reduce((best, p) => p.fppg > best.fppg ? p : best, lu[0]),
    };
}
// ── SLATE GRADER ──────────────────────────────────────────────────────────
function gradeSlate(gamesList) {
    if (!gamesList || gamesList.length === 0)

    }
    else {
        score += 5;
        notes.push("🚫 Only " + gamesList.length + " games — thin slate");
    }
    // Average total
    if (avgTotal >= 228) {
        score += 25;
        notes.push("✅ Avg O/U " + avgTotal.toFixed(1) + " — high scoring");
    }
    else if (avgTotal >= 222) {
        score += 15;
        notes.push("⚠️ Avg O/U " + avgTotal.toFixed(1) + " — moderate");
    }
    else {
        score += 5;
        notes.push("🚫 Avg O/U " + avgTotal.toFixed(1) + " — low scoring slate");
    }
    // High total games
    if (highTotalGames >= 3) {
        score += 25;
        notes.push("✅ " + highTotalGames + " games O/U 228+ — stacking gold");
    }
    else if (highTotalGames >= 1) {
        score += 15;
        notes.push("⚠️ " + highTotalGames + " game(s) O/U 228+");
    }
    else {
        score += 5;
        notes.push("🚫 No games over 228 — tough to stack");
    }
    // Elite implied team
    if (maxImpl >= 122) {
        score += 25;
        notes.push("✅ " + maxImpl + " implied pts — elite pace-up spot");
    }
    else if (maxImpl >= 116) {
        score += 15;
        notes.push("⚠️ " + maxImpl + " max implied — decent spot");

        score >= 70 ? "✅ PLAY — solid slate" :
            score >= 55 ? "⚠️ PLAY SMALL — average slate" :

}
// ── STACK ENGINE ──────────────────────────────────────────────────────────
// Find the best game to stack based on Vegas totals
function getBestStackGame(gamesList, players) {
    if (!gamesList || gamesList.length === 0)
        return null;
    const scored = gamesList.map(g => {
        const gamePlayers = players.filter(p => p.team === g.home || p.team === g.away);
        const topPlayers = gamePlayers.sort((a, b) => b.fppg - a.fppg).slice(0, 6);
        return Object.assign(Object.assign({}, g), { stackScore: (g.total || 220) * 0.5 + topPlayers.reduce((s, p) => s + p.fppg, 0) * 0.3, topPlayers });
    });
    return scored.sort((a, b) => b.stackScore - a.stackScore)[0];
}
// Generate lineups with stack awareness
function generateLineupsWithStrategy(players, count, lockedNames, excludedNames, gamesList, strategy) {
    // strategy: "chalk" | "leverage" | "tournament" | "mixed"
    const allLineups = [];
    const used = new Set();
    const bestGame = getBestStackGame(gamesList, players);
    const stackTeams = bestGame ? [bestGame.home, bestGame.away] : [];
    // Split count by strategy
    let chalkCount, leverageCount, tournCount;
    if (strategy === "chalk") {
        chalkCount = count;
        leverageCount = 0;
        tournCount = 0;
    }
    else if (strategy === "leverage") {
        chalkCount = 0;
        leverageCount = count;
        tournCount = 0;
    }
    else if (strategy === "tournament") {
        chalkCount = 0;
        leverageCount = 0;
        tournCount = count;
    }
    else { // mixed — the millionaire way
        chalkCount = Math.max(1, Math.round(count * 0.3));
        leverageCount = Math.max(1, Math.round(count * 0.4));
        tournCount = count - chalkCount - leverageCount;
    }
    const buildBatch = (batchCount, type) => {
        const { randomnessPct, numUniques, maxExposurePct } = getOptimizerSettings();
        const maxExpCount = Math.ceil((maxExposurePct / 100) * count); // GLOBAL cap uses total count
        // Per-type randomness scaling
        const typeNoise = type === 'chalk' ? randomnessPct * 0.3
                        : type === 'leverage' ? randomnessPct * 0.7
                        : randomnessPct * 1.2; // tournament gets most variance
        for (let attempt = 0; attempt < Math.max(batchCount * 200, 15000) && allLineups.filter(l => l._type === type).length < batchCount; attempt++) {
            // Apply randomness to projections
            let pool = applyRandomness([...players], typeNoise);
            if (type === "chalk") {
                pool.sort((a, b) => b.score - a.score);
            }
            else if (type === "leverage") {
                pool.sort((a, b) => {
                    const aBoost = stackTeams.includes(a.team) ? 12 : 0;
                    const bBoost = stackTeams.includes(b.team) ? 12 : 0;
                    return (b.score + bBoost) - (a.score + aBoost);
                });
            }
            else {
                // TOURNAMENT: game-stack enforcement
                // Pick the best game (highest O/U) and stack 3+ players from it
                // with at least 1 "bring-back" from the opposing team
                pool.sort((a, b) => b.score - a.score);

                // 70% of tournament lineups enforce a game stack
                const doStack = Math.random() < 0.70 && stackTeams.length === 2;
                if (doStack) {
                    const homeTeam = bestGame?.home;
                    const awayTeam = bestGame?.away;
                    // Pick primary stack team (random between home/away)
                    const primaryTeam = Math.random() < 0.5 ? homeTeam : awayTeam;
                    const bringBackTeam = primaryTeam === homeTeam ? awayTeam : homeTeam;

                    // Force primary stack players to top of pool
                    const primaryPlayers = pool.filter(p => p.team === primaryTeam);
                    const bringBackPlayers = pool.filter(p => p.team === bringBackTeam);
                    const otherPlayers = pool.filter(p => p.team !== primaryTeam && p.team !== bringBackTeam);

                    // Sort each group by score
                    primaryPlayers.sort((a, b) => b.score - a.score);
                    bringBackPlayers.sort((a, b) => b.score - a.score);

                    // Apply randomness within groups — vary which stack players get selected
                    const stackSize = Math.random() < 0.5 ? 3 : 4; // 3 or 4 from primary
                    const bringBackSize = 1; // always 1 bring-back

                    // Build pool: primary stack first, then bring-back, then rest
                    // Shuffle top of each group slightly for variance
                    const shuffleTop = (arr, n) => {
                        const top = arr.slice(0, Math.min(n + 2, arr.length));
                        for (let i = top.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [top[i], top[j]] = [top[j], top[i]];
                        }
                        return [...top, ...arr.slice(top.length)];
                    };

                    const shuffledPrimary = shuffleTop(primaryPlayers, stackSize);
                    const shuffledBB = shuffleTop(bringBackPlayers, bringBackSize);
                    pool = [...shuffledPrimary, ...shuffledBB, ...otherPlayers];
                } else {
                    // Non-stack lineup — pivot to mid-ownership player for GPP leverage
                    const midPlayers = pool.filter(p => p.ownership >= 8 && p.ownership < 22);
                    if (midPlayers.length > 0 && Math.random() < 0.5) {
                        const pivot = midPlayers[Math.floor(Math.random() * Math.min(midPlayers.length, 6))];
                        pool = [pivot, ...pool.filter(p => p.name !== pivot.name)];
                    }
                }
            }
            // Exposure cap — HARD BLOCK
            if (allLineups.length >= 2) {
                const expMap = getExposureMap(allLineups);
                const hardFiltered = pool.filter(p =>
                    lockedNames.includes(p.name) ||
                    (expMap[p.name] || 0) < maxExpCount
                );
                if (hardFiltered.length >= RULES.LINEUP_SIZE + 3) {
                    pool = hardFiltered;
                }
            }
            const lu = buildLineup(pool, lockedNames, excludedNames);
            if (!lu) continue;
            const key = lu.map(p => p.name).sort().join("|");
            if (used.has(key)) continue;
            // Progressive uniqueness relaxation
            const fillPct2 = allLineups.filter(l=>l._type===type).length / batchCount;
            const effUniq = fillPct2 < 0.7 ? numUniques : fillPct2 < 0.88 ? Math.max(1,numUniques-1) : 1;
            if (!passesUniquenessCheck(lu, allLineups, effUniq)) continue;
            used.add(key);
            // Check if lineup has a real game stack (3+ from same team = GPP ceiling)
            const gameCounts = {};
            const gameMatchupCounts = {};
            lu.forEach(p => {
                gameCounts[p.team] = (gameCounts[p.team] || 0) + 1;
                if (p.game) gameMatchupCounts[p.game] = (gameMatchupCounts[p.game] || 0) + 1;
            });
            const hasStack = Object.values(gameCounts).some(c => c >= 3); // real stack = 3+
            const stackedGame = Object.entries(gameMatchupCounts).find(([g, cnt]) => cnt >= 4)?.[0] || null;
            lu._type = type;
            lu._hasStack = hasStack;
            lu._stackGame = stackedGame || (bestGame ? bestGame.gameStr : null);
            lu._stackSize = Math.max(...Object.values(gameCounts));
            allLineups.push(lu);
        }
    };
    buildBatch(chalkCount, "chalk");
    buildBatch(leverageCount, "leverage");
    buildBatch(tournCount, "tournament");
    // Flatten — chalk first, then leverage, then tournament
    return [
        ...allLineups.filter(l => l._type === "chalk"),
        ...allLineups.filter(l => l._type === "leverage"),
        ...allLineups.filter(l => l._type === "tournament"),
    ];
}
// Bankroll entry strategy
function getEntryStrategy(bankroll, slateGrade) {
    if (!bankroll || bankroll <= 0)
        return null;
    const playPct = slateGrade >= 70 ? 0.15 : slateGrade >= 55 ? 0.08 : 0.03;
    const budget = +(bankroll * playPct).toFixed(2);
    // Micro-stakes tier: bankroll under $5 gets penny contests
    if (bankroll <= 5) {
        const microBudget = +(bankroll * 0.50).toFixed(2);
        return {
            budget: microBudget,
            breakdown: [
                { type: "Micro GPP ($0.25)", entries: Math.floor(microBudget * 0.60 / 0.25), stake: 0.25, pct: "60%" },
                { type: "Penny GPP ($0.05)", entries: Math.floor(microBudget * 0.40 / 0.05), stake: 0.05, pct: "40%" },
            ],
            note: "Micro bankroll — building up 🌱 stick to penny contests",
        };
    }
    // Small-stakes tier: $5–$20 bankroll
    if (bankroll <= 20) {
        return {
            budget,
            breakdown: [
                { type: "Micro GPP ($0.25)", entries: Math.floor(budget * 0.40 / 0.25), stake: 0.25, pct: "40%" },
                { type: "Low GPP ($1)", entries: Math.floor(budget * 0.40 / 1), stake: 1, pct: "40%" },
                { type: "Mid GPP ($3)", entries: Math.floor(budget * 0.20 / 3), stake: 3, pct: "20%" },
            ],
            note: "Small bankroll — volume in cheap GPPs",
        };
    }
    return {
        budget,
        breakdown: [
            { type: "Mid-stakes ($3-5)", entries: Math.floor(budget * 0.70 / 4), stake: 4, pct: "70%" },
            { type: "Large field ($1)", entries: Math.floor(budget * 0.20 / 1), stake: 1, pct: "20%" },
            { type: "Big tournament ($25)", entries: Math.floor(budget * 0.10 / 25), stake: 25, pct: "10%" },
        ],
        note: slateGrade >= 70 ? "Full send — good slate" : slateGrade >= 55 ? "Half size — average slate" : "Min entries only",
    };
}
// ── ESPN INJURY FETCH ─────────────────────────────────────────────────────
async function fetchESPNInjuries() {
    try {
        const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/basketball/nba/injuries");
        const data = await res.json();
        const results = [];
        for (const team of (data.injuries || [])) {
            const teamAbbr = team.team?.abbreviation || "";
            for (const item of (team.injuries || [])) {
                const athlete = item.athlete || {};
                const name = athlete.displayName || "";
                const statusRaw = (item.status || "").toLowerCase();
                let status = "Q";
                if (statusRaw.includes("out") || statusRaw.includes("injured reserve")) status = "OUT";
                else if (statusRaw.includes("questionable")) status = "Q";
                else if (statusRaw.includes("doubtful")) status = "Q";
                else if (statusRaw.includes("probable")) status = "Q";
                else continue; // skip healthy/day-to-day with no real flag
                const reason = item.longComment || item.shortComment || item.type?.description || "";
                if (name) results.push({ name, team: teamAbbr, status, reason, dfsImpact: "", source: "ESPN" });
            }
        }
        return results;
    } catch(e) {
        return [];
    }
}
// Merge ESPN live data with hardcoded DFS impact notes
function mergeInjuryData(espnData, hardcoded) {
    const merged = [...hardcoded];
    for (const espn of espnData) {
        const existing = merged.find(h => h.name.toLowerCase() === espn.name.toLowerCase());
        if (existing) {
            // Update status from ESPN but keep our DFS impact notes
            existing.status = espn.status;
