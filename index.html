const LEAGUE_AVG_TOTAL = 226;

const DEFAULT_SLATE_GAMES = [];

const RULES = {

const POSITION_ORDER = ["PG", "SG", "SF", "PF", "C"];
function toStatMuseSlug(name) { return name.toLowerCase().replace(/['']/g,"").replace(/[^a-z0-9\s-]/g,"").trim().replace(/\s+/g,"-"); }

function safeNum(v,f=0){return Number.isFinite(v)?v:f;}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function randn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

function buildTeamMap(games){
  const m={};
  for(const g of games){
    const sp=g.homeSpread;
    const hi=+((g.total/2)-(sp/2)).toFixed(1);
    const ai=+(g.total-hi).toFixed(1);
    m[g.home]={total:g.total,impliedPts:hi,spread:sp,opponent:g.away,gameStr:`${g.away}@${g.home}`,isHome:true};
    m[g.away]={total:g.total,impliedPts:ai,spread:-sp,opponent:g.home,gameStr:`${g.away}@${g.home}`,isHome:false};
  }

}
function buildGamesList(games){

    const ai=+(g.total-hi).toFixed(1);
    return{home:g.home,away:g.away,total:g.total,homeImpl:hi,awayImpl:ai,homeSpread:g.homeSpread,gameStr:`${g.away}@${g.home}`};
  });
}
function buildProjectionBoostMap(outPlayers,cascadeRules){
  const b={};
  for(const out of outPlayers){
    for(const rule of cascadeRules.filter(r=>r.trigger.toLowerCase()===out.toLowerCase())){
      for(const x of rule.beneficiaries){
        const k=x.name.toLowerCase();
        if(!b[k])b[k]={projBoost:1,minutesBoost:1,notes:[]};
        b[k].projBoost*=(x.projBoost||1);b[k].minutesBoost*=(x.minutesBoost||1);
        if(x.note)b[k].notes.push(`${out}: ${x.note}`);
      }
    }
  }
  return b;
}
function teamCtx(player,teamMap={}){
  const v=teamMap[player.team]||{};
  const impl=safeNum(v.impliedPts,LEAGUE_AVG_IMPLIED);
  const tot=safeNum(v.total,LEAGUE_AVG_TOTAL);
  const sp=safeNum(v.spread,0);
  const abs=Math.abs(sp);
  const paceR=clamp(tot/LEAGUE_AVG_TOTAL,0.93,1.07);
  const implR=clamp(impl/LEAGUE_AVG_IMPLIED,0.93,1.10);
  const spAdj=abs<=4?1.02:abs>=15?0.94:abs>=10?0.97:1.00;
  const homeAdj=v.isHome?1.015:0.985;
  return{total:tot,impliedPts:impl,spread:sp,paceR,implR,spAdj,homeAdj,opponent:v.opponent||"",gameStr:v.gameStr||player.game,isHome:!!v.isHome};
}
function buildProjection(player,teamMap={},projBoost=1,minBoost=1){
  const ctx=teamCtx(player,teamMap);

  const recent5=safeNum(player.recent5,0);

  if(base<=0)return null;

  const mean=base*injM*ctx.paceR*ctx.implR*ctx.spAdj*ctx.homeAdj*b2b*projBoost;
  const cov=0.22;
  const salAdj=player.salary>=10000?1.8:player.salary>=8000?1.2:player.salary>=6000?0.6:0.2;
  const sd=player.histStdev>0?player.histStdev:Math.max(4.5,mean*cov+salAdj);
  const floor=Math.max(0,mean-1.4*sd);
  const ceil=mean+1.65*sd;
  const mins=player.minutes||Math.min(40,Math.max(12,(base/1.4)+(player.salary/1000-5)*1.5));
  const val=mean/Math.max(player.salary/1000,1);
  return{...player,baseFppg:round1(base),projMean:round1(mean),projFloor:round1(floor),projCeiling:round1(ceil),stdev:round1(sd),value:round2(val),fppg:round1(mean),minutesProj:round1(mins*minBoost),gameTotal:ctx.total,impliedPts:ctx.impliedPts,spread:ctx.spread,opponent:ctx.opponent,game:ctx.gameStr||player.game,isHome:ctx.isHome};
}
function compositeScore(p){
  const lev=Math.min((p.projCeiling||p.fppg||0)/Math.max(p.ownership||5,5),8);
  const sb=p.gameTotal>=232?2.8:p.gameTotal>=226?1.5:p.gameTotal>=220?0.5:0;
  const op=Math.max(0,(p.ownership||0)-38)*0.08;
  return(p.projMean||p.fppg||0)*0.82+(p.projCeiling||p.fppg||0)*0.14+lev*0.40+(p.value||0)*0.4+sb+(p.statMuseFD?0.75:0)-op;
}
function estimateOwnership(player,teamMap){
  const v=teamMap[player.team];if(!v)return 15;
  let base=8;
  if(v.impliedPts>=122)base=24;else if(v.impliedPts>=118)base=20;else if(v.impliedPts>=114)base=17;else if(v.impliedPts>=110)base=14;else if(v.impliedPts>=106)base=11;

  const ft=player.fppg>=50?1.5:player.fppg>=42?1.3:player.fppg>=34?1.15:player.fppg>=26?1.0:0.85;

function parsePlayers(csvText,ownMap,smMap={},teamMap={},outPlayers=[],cascadeRules=[],extraData={}){
  const lines=csvText.trim().split("\n");

  const players=[];const boosts=buildProjectionBoostMap(outPlayers,cascadeRules);
  const idCol=hdrs.findIndex(h=>h==="id"||h==="playerid"||h==="player_id");
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(",");if(cols.length<8)continue;
    const get=k=>cols[hdrs.indexOf(k)]?.trim()??"";
    const fdId=idCol>=0?(cols[idCol]?.trim()??""):"";
    const name=get("nickname")||((get("firstname")+" "+get("lastname")).trim());
    const csvFppg=parseFloat(get("fppg"))||0;const salary=parseInt(get("salary"))||0;
    const injury=get("injuryindicator")||"";const played=parseInt(get("played"))||0;
    const team=get("team");const game=get("game");
    const posRaw=get("rosterposition")||get("position");
    const positions=posRaw.split("/").map(p=>p.trim()).filter(p=>POSITION_ORDER.includes(p));
    if(!name||!salary||!csvFppg||injury==="O"||!positions.length)continue;
    const key=name.toLowerCase();const smData=smMap[key];
    const baseFppg=smData?.fdAvg||csvFppg;const statMuseFD=!!smData;
    if(baseFppg<RULES.FLOOR_FPPG_MIN)continue;
    const ownership=ownMap[key]??15;if(ownership<RULES.NEVER_PLAY_OWN_THRESHOLD)continue;
    const boost=boosts[key]?.projBoost??1;const minBoost=boosts[key]?.minutesBoost??1;
    const extra=extraData[key]||{};
    let p={fdId,name,fppg:baseFppg,csvFppg,salary,injury,played,team,game,positions,ownership,statMuseFD,smLast:smData?.lastGame,smAvg:smData?.fdAvg,smTrend:smData?.trend,cascadeNotes:boosts[key]?.notes||[],recent5:extra.recent5||0,histStdev:extra.histStdev||0,minutes:extra.minutes||0,isB2B:!!extra.isB2B};
    const proj=buildProjection(p,teamMap,boost,minBoost);if(!proj)continue;

  }

}

// [v5.2] STRATEGY WEIGHTS - KEY CHANGE: tournament stackBoost 3.3->6.5
function getStrategyWeights(type){
  if(type==="chalk")     return{mean:1.08,ceiling:0.18,leverage:0.14,ownPenalty:0.012,stackBoost:0.8, noise:1.4,bringBack:0};
  if(type==="leverage")  return{mean:0.88,ceiling:0.38,leverage:0.55,ownPenalty:0.006,stackBoost:4.5, noise:5.0,bringBack:2.5};
  if(type==="tournament")return{mean:0.78,ceiling:0.58,leverage:0.65,ownPenalty:0.003,stackBoost:6.5, noise:8.0,bringBack:3.5};
  return                       {mean:0.98,ceiling:0.28,leverage:0.36,ownPenalty:0.008,stackBoost:2.0, noise:3.0,bringBack:1.0};
}
function playerObj(p,w,stackTeams=[],bbTeams=[]){
  const sb=stackTeams.includes(p.team)?w.stackBoost:0;
  const bb=bbTeams.includes(p.team)?w.bringBack:0;
  const lev=Math.min((p.projCeiling||p.fppg||0)/Math.max(p.ownership||5,5),8);
  return(p.projMean||p.fppg||0)*w.mean+(p.projCeiling||p.fppg||0)*w.ceiling+lev*w.leverage+sb+bb-(p.ownership||0)*w.ownPenalty;
}
function enumLocked(lp,slots){
  const res=[];
  function dfs(i,rem,asgn){
    if(i===lp.length){res.push({assigned:asgn.slice(),remainingSlots:rem.slice()});return;}
    const p=lp[i];const tried=new Set();
    for(let j=0;j<rem.length;j++){
      const s=rem[j];if(tried.has(s))continue;if(!p.positions.includes(s))continue;tried.add(s);
      const nxt=rem.slice();nxt.splice(j,1);asgn.push({...p,slot:s});dfs(i+1,nxt,asgn);asgn.pop();
    }
  }
  dfs(0,slots.slice(),[]);return res;
}
// [v5.2] minStackSize param - tournament passes 3
function hasStack(lu,min=2){const c={};lu.forEach(p=>{c[p.team]=(c[p.team]||0)+1;});return Object.values(c).some(x=>x>=min);}
function hasBB(lu,st,bb){if(!st.length||!bb.length)return false;return lu.some(p=>st.includes(p.team))&&lu.some(p=>bb.includes(p.team));}
function lineupKey(lu){return lu.map(p=>p.name).sort().join("|");}
function getSlots(){return["C","PG","PG","SG","SG","SF","SF","PF","PF"];}
function buildPool(players,locked,excl,st,bb,type,attempt){
  const w=getStrategyWeights(type);
  const lk=new Set(locked);const ex=new Set(excl);
  const sc=players.filter(p=>!ex.has(p.name)).map(p=>({...p,_ps:playerObj(p,w,st,bb)+(Math.random()-0.5)*w.noise+(attempt*0.02)}));
  if(type==="tournament"){const mids=sc.filter(p=>p.ownership>=8&&p.ownership<=22).slice(0,12);if(mids.length)mids[Math.floor(Math.random()*mids.length)]._ps+=5.5;}
  sc.sort((a,b)=>{if(lk.has(a.name)&&!lk.has(b.name))return-1;if(!lk.has(a.name)&&lk.has(b.name))return 1;return b._ps-a._ps;});
  return sc;
}
function buildLineup(players,locked=[],excl=[],type="mixed",st=[],bb=[],reqStack=true,minStack=2){
  const slots=getSlots();const w=getStrategyWeights(type);
  const lk=new Set(locked);const ex=new Set(excl);
  const usable=players.filter(p=>!ex.has(p.name));
  const lp=usable.filter(p=>lk.has(p.name));const up=usable.filter(p=>!lk.has(p.name));
  const la=enumLocked(lp,slots);if(!la.length)return null;
  let best={score:-Infinity,lineup:null};
  const t0=Date.now();const TMS=type==="chalk"?24:45;const needStack=reqStack&&type!=="chalk";
  function greedy(asgn){
    const needed=asgn.remainingSlots.slice();const used=new Set(asgn.assigned.map(p=>p.name));
    const lu=asgn.assigned.slice();let sal=lu.reduce((s,p)=>s+p.salary,0);
    const bySlot={};
    needed.forEach(s=>{bySlot[s]=up.filter(p=>!used.has(p.name)&&p.positions.includes(s)).sort((a,b)=>playerObj(b,w,st,bb)-playerObj(a,w,st,bb)).slice(0,s==="C"?10:12);});
    for(const s of needed){const cands=bySlot[s]||[];let picked=null;const rem=needed.length-lu.filter(x=>x.slot&&needed.includes(x.slot)).length-1;for(const p of cands){if(used.has(p.name))continue;const ns=sal+p.salary;if(ns>RULES.SALARY_CAP)continue;if(ns+rem*3500>RULES.SALARY_CAP)continue;picked=p;break;}if(!picked)return null;used.add(picked.name);lu.push({...picked,slot:s});sal+=picked.salary;}

  }

    const base=asgn.assigned.slice();const bsal=base.reduce((s,p)=>s+p.salary,0);const bsc=base.reduce((s,p)=>s+playerObj(p,w,st,bb),0);
    const uos=[...new Set(asgn.remainingSlots)];const sc={};
    uos.forEach(s=>{sc[s]=up.filter(p=>!used.has(p.name)&&p.positions.includes(s)).map(p=>({...p,_so:playerObj(p,w,st,bb)})).sort((a,b)=>b._so-a._so).slice(0,s==="C"?8:11);});
    if(uos.some(s=>!(sc[s]||[]).length))continue;

    for(let i=os.length-1;i>=0;i--)su[i]=su[i+1]+sm[i];
    let to=false;
    function dfs(i,lu,sal,sc2){
      if(Date.now()-t0>TMS){to=true;return;}
      if(i===os.length){if(sal<RULES.MIN_SALARY_USED||sal>RULES.SALARY_CAP)return;if(needStack&&!hasStack(lu,minStack))return;if(sc2>best.score)best={score:sc2,lineup:lu.slice()};return;}
      if(sc2+su[i]<best.score)return;

// [v5.2] Returns TOP 3 games sorted by stack score
function getBestStackGames(gamesList,players){
  if(!gamesList||!gamesList.length)return[];
  return gamesList.map(g=>{
    const gp=players.filter(p=>p.team===g.home||p.team===g.away);
    const top=gp.sort((a,b)=>b.fppg-a.fppg).slice(0,6);
    return{...g,stackScore:(g.total||220)*0.5+top.reduce((s,p)=>s+p.fppg,0)*0.3,topPlayers:top};
  }).sort((a,b)=>b.stackScore-a.stackScore).slice(0,3);
}

function simulateSlate(players,iterations=240){
  const sims=[];const games={};
  players.forEach(p=>{if(!games[p.game])games[p.game]={};});
  for(let i=0;i<iterations;i++){
    const env={};Object.keys(games).forEach(g=>{env[g]={ps:randn()*3.2,ts:{},us:{}};});
    const out={};
    for(const p of players){
      const gk=p.game||"NA";if(!env[gk])env[gk]={ps:randn()*3.2,ts:{},us:{}};
      if(!(p.team in env[gk].ts))env[gk].ts[p.team]=randn()*1.8;
      if(!(p.team in env[gk].us))env[gk].us[p.team]=randn()*1.2;
      const mean=p.projMean??p.fppg??0;const sd=Math.min(15,p.stdev??Math.max(4.0,mean*0.22));
      out[p.name]=Math.max(0,mean+env[gk].ps*0.32+env[gk].ts[p.team]*0.28-env[gk].us[p.team]*0.15+randn()*0.5+randn()*sd);
    }

  }

function simScore(lu,sims){
  const tots=sims.map(s=>lu.reduce((sum,p)=>sum+(s[p.name]||0),0)).sort((a,b)=>a-b);
  const mean=tots.reduce((a,b)=>a+b,0)/Math.max(tots.length,1);
  return{mean,p25:tots[Math.floor(tots.length*0.25)]??mean,p75:tots[Math.floor(tots.length*0.75)]??mean,p90:tots[Math.floor(tots.length*0.90)]??mean,p99:tots[Math.floor(tots.length*0.99)]??mean};
}
function minUnique(a,b){const sa=new Set(a.map(p=>p.name));let sh=0;b.forEach(p=>{if(sa.has(p.name))sh++;});return Math.max(0,9-sh);}
function selectPortfolio(candidates,n){
  const sel=[];const exp={};const maxE=n<=3?1:n<=10?0.65:0.5;const minU=n>=15?3:n>=8?2:1;
  const sorted=[...candidates].sort((a,b)=>(b._ps2||0)-(a._ps2||0));
  for(const lu of sorted){
    if(sel.length>=n)break;
    if(sel.some(e=>minUnique(e,lu)<minU))continue;
    let bad=false;for(const p of lu){if(((exp[p.name]||0)+1)/n>maxE){bad=true;break;}}
    if(bad&&sel.length>=Math.max(2,Math.floor(n*0.35)))continue;
    sel.push(lu);lu.forEach(p=>{exp[p.name]=(exp[p.name]||0)+1;});
  }

}
function lineupStats(lu){
  return{total:lu.reduce((s,p)=>s+p.salary,0),proj:lu.reduce((s,p)=>s+p.fppg,0),avgOwn:lu.reduce((s,p)=>s+p.ownership,0)/lu.length,cumOwn:lu.reduce((s,p)=>s+p.ownership,0),chalk:lu.filter(p=>p.ownership>=30).length,mid:lu.filter(p=>p.ownership>=10&&p.ownership<30).length,punt:lu.filter(p=>p.ownership<5).length,anchor:lu.reduce((b,p)=>p.fppg>b.fppg?p:b,lu[0])};
}
function gradeSlate(gl){
  if(!gl||!gl.length)return null;
  const tots=gl.map(g=>g.total).filter(Boolean);const impl=gl.flatMap(g=>[g.homeImpl,g.awayImpl]).filter(Boolean);
  const avg=tots.reduce((a,b)=>a+b,0)/tots.length;const hi=gl.filter(g=>g.total>=228).length;const maxI=Math.max(...impl);
  let sc=0;const notes=[];
  if(gl.length>=8){sc+=25;notes.push("[OK] Full 8-game slate");}else if(gl.length>=6){sc+=18;notes.push("[!] "+gl.length+" games");}else if(gl.length>=4){sc+=12;notes.push("[!] "+gl.length+" games - playoff");}else{sc+=5;notes.push("[NO] "+gl.length+" games - tiny");}
  if(avg>=228){sc+=25;notes.push("[OK] Avg O/U "+avg.toFixed(1));}else if(avg>=222){sc+=15;notes.push("[!] Avg O/U "+avg.toFixed(1));}else{sc+=5;notes.push("[NO] Low: "+avg.toFixed(1));}
  if(hi>=3){sc+=25;notes.push("[OK] "+hi+" games 228+");}else if(hi>=1){sc+=15;notes.push("[!] "+hi+" game(s) 228+");}else{sc+=5;notes.push("[NO] No high-total games");}
  if(maxI>=122){sc+=25;notes.push("[OK] "+maxI+" implied - elite");}else if(maxI>=116){sc+=15;notes.push("[!] "+maxI+" max implied");}else{sc+=5;notes.push("[NO] Max implied "+maxI);}
  const grade=sc>=85?"A":sc>=70?"B":sc>=55?"C":sc>=40?"D":"F";
  const rec=sc>=85?"[HOT] MUST PLAY":sc>=70?"[OK] PLAY - solid":sc>=55?"[!] PLAY SMALL":sc>=40?"[NO] SKIP OR MIN":"[NO] SKIP";
  return{score:sc,grade,notes,recommendation:rec,playIt:sc>=55,highTotalGames:hi,avgTotal:avg,maxImpl:maxI};
}

// [v5.2] MAIN GENERATOR with multi-game stack rotation + projection floor
function generateLineupsWithStrategy(players,count,locked,excl,gamesList,strategy){
  if(!players||!players.length||count<=0)return[];
  const bestGames=getBestStackGames(gamesList,players);
  const all=[];const used=new Set();
  let chalk=0,lev=0,tourn=0;
  if(strategy==="chalk"){chalk=count;}else if(strategy==="leverage"){lev=count;}else if(strategy==="tournament"){tourn=count;}
  else{chalk=Math.max(1,Math.round(count*0.30));lev=Math.max(1,Math.round(count*0.35));tourn=Math.max(0,count-chalk-lev);}
  const t0=Date.now();const MAX_MS=1500;const small=gamesList.length<=4;const reqStack=!small&&bestGames.length>0;

  function batch(target,type){
    const attempts=Math.max(target*8,25);const perT=Math.max(target,Math.ceil(target*1.8));
    const minStack=type==="tournament"?3:2; // [v5.2] tournament requires 3-stack
    for(let att=0;att<attempts;att++){
      if(Date.now()-t0>MAX_MS)break;
      if(all.filter(l=>l._type===type).length>=perT)break;
      // [v5.2] rotate stack game per attempt
      const gi=bestGames.length>1?(att%bestGames.length):0;
      const sg=bestGames[gi]||bestGames[0];
      let st=[],bb=[];
      if(sg){const hi=sg.homeImpl||LEAGUE_AVG_IMPLIED;const ai=sg.awayImpl||LEAGUE_AVG_IMPLIED;if(hi>=ai){st=[sg.home];bb=[sg.away];}else{st=[sg.away];bb=[sg.home];}}
      const pool=buildPool(players,locked,excl,st,bb,type,att).slice(0,45);
      const lu=buildLineup(pool,locked,excl,type,st,bb,reqStack,minStack);
      if(!lu||lu.length!==9)continue;
      // [v5.2] projection floor filter
      const proj=lu.reduce((s,p)=>s+(p.projMean||p.fppg||0),0);
      if(type!=="chalk"&&proj<MIN_PROJ_FILTER)continue;
      const k=lineupKey(lu);if(used.has(k))continue;used.add(k);
      lu._type=type;lu._hasStack=hasStack(lu,minStack);lu._hasBB=hasBB(lu,st,bb);lu._sg=sg?.gameStr||null;lu._proj=round1(proj);
      all.push(lu);
    }
  }
  if(chalk>0)batch(chalk,"chalk");
  if(lev>0)batch(lev,"leverage");
  if(tourn>0)batch(tourn,"tournament");
  // fallback
  if(!all.length&&reqStack){for(let att=0;att<count*8;att++){const pool=buildPool(players,locked,excl,[],[],"mixed",att).slice(0,45);const lu=buildLineup(pool,locked,excl,"mixed",[],[],false,2);if(!lu||lu.length!==9)continue;const k=lineupKey(lu);if(used.has(k))continue;used.add(k);lu._type="mixed";lu._hasStack=hasStack(lu);lu._hasBB=false;lu._sg=null;all.push(lu);}}
  if(!all.length)return[];
  const iters=Math.min(220,Math.max(80,60+count*6));const sims=simulateSlate(players.slice(0,70),iters);
  all.forEach(lu=>{
    const ss=simScore(lu,sims);const st=lineupStats(lu);
    lu._sm=round1(ss.mean);lu._sp25=round1(ss.p25);lu._sp75=round1(ss.p75);lu._sp90=round1(ss.p90);lu._sp99=round1(ss.p99);
    // [v5.2] tournament portfolio score prioritizes p99 (tail hits)
    if(lu._type==="chalk")lu._ps2=ss.mean*0.55+ss.p25*0.35+ss.p75*0.10-st.avgOwn*0.05;
    else if(lu._type==="tournament")lu._ps2=ss.mean*0.20+ss.p90*0.35+ss.p99*0.40+(lu._hasBB?3.0:0)+(lu._hasStack?2.5:0)-st.avgOwn*0.10;
    else lu._ps2=ss.mean*0.40+ss.p75*0.25+ss.p90*0.25+(lu._hasStack?2.0:0)+(lu._hasBB?1.5:0)-st.avgOwn*0.08;
  });
  return selectPortfolio(all,count).sort((a,b)=>(b._ps2||0)-(a._ps2||0));
}

function applyCascades(outP,ownMap,rules){
  const nm={...ownMap};const log=[];
  for(const out of outP){for(const rule of rules.filter(r=>r.trigger.toLowerCase()===out.toLowerCase())){for(const b of rule.beneficiaries){const k=b.name.toLowerCase();const cur=nm[k]??15;const bst=Math.min(65,+((cur*(b.ownBoost||1)).toFixed(1)));nm[k]=bst;log.push({out,player:b.name,from:cur,to:bst});}}}
  return{newMap:nm,log};
}

}
