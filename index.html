          // [v5.7.3] Include debug internals so we can see where candidates came from
          const dbg = (typeof window !== "undefined" && window.__courtEdgeDebug) || {};
          const byType = dbg.byType || {};
          const emergencyNote = byType.emergency > 0 ? ` · ⚠️ ${byType.emergency} from EMERGENCY fallback (no stacks)` : "";
          setGenStatus(`✅ Generated ${arr.length}/${safeCount} lineups in ${dur}ms · ${effectiveGames.length} games · playoff ${playoffMode ? "ON" : "OFF"} · candidates: C${byType.chalk||0}/L${byType.leverage||0}/T${byType.tournament||0}/M${byType.mixed||0}${emergencyNote}`);
          setStep("results");
          setActiveTab("lineups");
        }
      } catch (e) {
        console.error("Generate failed", e);
        setGenStatus(`❌ Generation crashed: ${e.message}`);
      }
      finally { setGenerating(false); }
    });
  };

  const handleExport = () => { if (!lineups.length) return; const csv = exportLineupsToFanDuel(lineups); const timestamp = new Date().toISOString().slice(0,10); downloadCSV(csv, `court-edge-lineups-${timestamp}.csv`); };

  const applyExclusions = (next, removedName = null) => {
    const uniqueNext = [...new Set(next)];
    const outList = uniqueNext.filter(n => injuries.some(i => i.name === n && i.status === "OUT"));
    const { newMap, log } = applyCascades(outList, ownershipMap, cascadeRules);
    setCascadeLog(log);
    setOwnershipMap(newMap);
    setExcludedNames(uniqueNext);
    if (removedName) setLockedNames(prev => prev.filter(n => n !== removedName));
    rebuildPlayers(csvText, newMap, statMuseMap, uniqueNext);
  };
  const toggleLock = (name) => { setLockedNames(p => p.includes(name) ? p.filter(n => n !== name) : [...p, name]); setExcludedNames(p => p.filter(n => n !== name)); };
  const toggleExclude = (name) => { const next = excludedNames.includes(name) ? excludedNames.filter(n => n !== name) : [...excludedNames, name]; applyExclusions(next, name); };

  useEffect(() => {
    if (csvText) rebuildPlayers(csvText, ownershipMap, statMuseMap, excludedNames);
    // eslint-disable-next-line
  }, [games, dvpMap, playoffMode]);

  const S = {
    app: { minHeight: "100vh", background: "#060e18", color: "#e2e8f0", fontFamily: "'IBM Plex Mono', monospace", paddingBottom: 40 },
    hdr: { background: "linear-gradient(180deg,#0a1f35 0%,#060e18 100%)", borderBottom: "1px solid #1e3040", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" },
    pill: (a) => ({ padding: "4px 12px", borderRadius: 20, border: `1px solid ${a ? "#3b82f6" : "#1e3040"}`, background: a ? "#1a3550" : "transparent", color: a ? "#60a5fa" : "#4a6a80", fontSize: 11, cursor: "pointer", letterSpacing: 1, fontFamily: "inherit" }),
    card: { background: "#091520", border: "1px solid #1e3040", borderRadius: 12, padding: 20 },
    btn: (v = "primary") => ({ padding: "9px 20px", borderRadius: 8, border: "none", cursor: "pointer", fontFamily: "inherit", fontWeight: 600, fontSize: 12, letterSpacing: 1, background: v === "primary" ? "#2563eb" : v === "success" ? "#16a34a" : v === "warning" ? "#ea580c" : "#1e3040", color: v === "ghost" ? "#94a3b8" : "#fff" }),
    sec: { padding: "20px 24px" },
  };

  const slateGrade = games.length ? gradeSlate(vegasGames) : null;

  return (
    <div style={S.app}>
      <div style={S.hdr}>
        <div>
          <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: 2, color: "#60a5fa" }}>COURT EDGE</div>
          <div style={{ fontSize: 9, color: "#3b82f6", letterSpacing: 3 }}>NBA DFS OPTIMIZER v5.8.1 · DIVERSITY HARDENING · MAXRESULTS4U BUSINESS SOLUTIONS</div>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          {[["upload","1.UPLOAD"],["build","2.BUILD"],["results","3.RESULTS"]].map(([st, label]) => <button key={st} style={S.pill(step === st)} onClick={() => players.length > 0 && setStep(st)}>{label}</button>)}
        </div>
      </div>

      {step === "upload" && (
        <div style={{ maxWidth: 680, margin: "40px auto", padding: "0 24px" }}>
          {slateGrade && (() => {
            const gradeColor = slateGrade.grade === "A" ? "#22c55e" : slateGrade.grade === "B" ? "#60a5fa" : slateGrade.grade === "C" ? "#f59e0b" : "#ef4444";
            return (
              <div style={{ marginBottom: 16, background: "#091520", border: `1px solid ${gradeColor}44`, borderRadius: 12, padding: 18 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ textAlign: "center", minWidth: 56 }}>
                    <div style={{ fontSize: 42, fontWeight: 900, color: gradeColor, lineHeight: 1 }}>{slateGrade.grade}</div>
                    <div style={{ fontSize: 9, color: "#4a6a80", letterSpacing: 2 }}>SLATE</div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: gradeColor, marginBottom: 3 }}>{slateGrade.recommendation}</div>
                    <div style={{ fontSize: 10, color: "#4a6a80" }}>{games.length} games · Avg O/U {slateGrade.avgTotal.toFixed(1)} · Max implied {slateGrade.maxImpl}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 22, fontWeight: 700, color: gradeColor }}>{slateGrade.score}/100</div>
                  </div>
                </div>
              </div>
            );
          })()}
          <div style={{ ...S.card, marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div><div style={{ fontSize: 13, fontWeight: 700, color: "#60a5fa", letterSpacing: 1 }}>TONIGHT'S SLATE</div></div>
              <div style={{ fontSize: 11, color: games.length ? "#22c55e" : "#f59e0b" }}>{games.length} game{games.length !== 1 ? "s" : ""}</div>
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 12, alignItems: "center" }}>
              <input
                value={oddsApiKey}
                onChange={e => updateOddsApiKey(e.target.value)}
                placeholder="Paste your the-odds-api.com key here"
                type="password"
                style={{ flex: 1, background: "#0d1e2e", border: "1px solid #1e3040", color: "#e2e8f0", padding: "6px 10px", fontSize: 11, borderRadius: 6, fontFamily: "inherit" }}
              />
              <button
                onClick={fetchVegasLines}
                disabled={fetchingOdds || !oddsApiKey.trim()}
                style={{ background: fetchingOdds ? "#1e3040" : "#7c3aed", color: "#fff", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 11, cursor: fetchingOdds || !oddsApiKey.trim() ? "default" : "pointer", fontFamily: "inherit", fontWeight: 600, whiteSpace: "nowrap" }}
              >
                {fetchingOdds ? "FETCHING..." : "⚡ AUTO-FILL LINES"}
              </button>
            </div>
            {oddsError && <div style={{ fontSize: 10, color: oddsError.startsWith("✅") ? "#22c55e" : "#f59e0b", marginBottom: 8, padding: "5px 8px", background: "#0a1520", borderRadius: 4 }}>{oddsError}</div>}
            {oddsApiKey && !oddsError && <div style={{ fontSize: 9, color: "#22c55e", marginBottom: 8 }}>✅ Key saved to browser</div>}
            {!oddsApiKey && <div style={{ fontSize: 9, color: "#3b6280", marginBottom: 8 }}>Get a free key at <a href="https://the-odds-api.com" target="_blank" rel="noreferrer" style={{color:"#60a5fa"}}>the-odds-api.com</a> · 500 req/mo free</div>}
            <SlatePanel games={games} onUpdate={setGames} />
          </div>
          <div style={S.card}>
            <div style={{ textAlign: "center", marginBottom: 22 }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#60a5fa", letterSpacing: 1, marginBottom: 6 }}>UPLOAD FANDUEL CSV</div>
              <div style={{ fontSize: 11, color: "#4a6a80", lineHeight: 1.8 }}>Make sure "Id" column is included for lineup export.</div>
            </div>
            <div onClick={() => fileRef.current.click()} style={{ border: "2px dashed #1e3040", borderRadius: 10, padding: "36px 20px", textAlign: "center", cursor: "pointer" }} onMouseOver={e => e.currentTarget.style.borderColor = "#3b82f6"} onMouseOut={e => e.currentTarget.style.borderColor = "#1e3040"}>
              <div style={{ fontSize: 13, color: "#60a5fa", marginBottom: 4 }}>Click to select CSV</div>
              <div style={{ fontSize: 11, color: "#4a6a80" }}>FanDuel-NBA-*.csv</div>
            </div>
            <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{ display: "none" }} />
          </div>

          {/* [v5.7] PLAYOFF MODE toggle — reflects playoff rotation/defense realities */}
          <div style={{ marginBottom: 16, background: playoffMode ? "#0a1a0a" : "#0a1520", border: `1px solid ${playoffMode ? "#22c55e66" : "#1e3040"}`, borderRadius: 10, padding: "12px 14px", display: "flex", alignItems: "center", gap: 14 }}>
            <button
              onClick={() => setPlayoffMode(!playoffMode)}
              style={{
                width: 46, height: 24, borderRadius: 12, padding: 0,
                background: playoffMode ? "#16a34a" : "#374151",
                border: "none", cursor: "pointer", position: "relative", flexShrink: 0,
                transition: "background 0.2s"
              }}
              aria-label={playoffMode ? "Disable Playoff Mode" : "Enable Playoff Mode"}
            >
              <div style={{
                position: "absolute", width: 20, height: 20, borderRadius: "50%",
                background: "#fff", top: 2, left: playoffMode ? 24 : 2,
                transition: "left 0.2s", boxShadow: "0 2px 4px rgba(0,0,0,0.3)"
              }} />
            </button>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: playoffMode ? "#22c55e" : "#4a6a80", letterSpacing: 1, marginBottom: 2 }}>
                PLAYOFF MODE {playoffMode ? "ON" : "OFF"}
              </div>
              <div style={{ fontSize: 10, color: "#4a6a80", lineHeight: 1.5 }}>
                {playoffMode
                  ? "Applying tiered FPPG haircut · stars +3% · mid-tier -6 to -12% · role players -18 to -22%"
                  : "Regular-season FPPG used as baseline — turn ON when playoffs tip off"}
              </div>
            </div>
          </div>
          <div style={{ ...S.card, marginTop: 16, borderColor: "#22c55e44" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#22c55e", letterSpacing: 1, marginBottom: 10 }}>v5.7 — PLAYOFF MODE (Apr 20 post-Apr 19 post-mortem #2)</div>
            <div style={{ fontSize: 10, color: "#94a3b8", lineHeight: 1.8 }}>
              · <strong style={{color:"#22c55e"}}>Playoff FPPG haircut:</strong> Sharpe was 11/11 exposure in v5.6 because his 31.3 regular-season FPPG overstates playoff production (tight D, short rotations). v5.7 applies tiered haircut — stars +3%, role players -18% — reflecting that usage concentrates on top 2-3 guys in playoffs.<br/>
              · <strong style={{color:"#22c55e"}}>Diversity hardening:</strong> Removed the safety-net final fill that let players hit 100% exposure when the optimizer ran out of diverse candidates. Portfolio may be slightly smaller than requested on narrow slates — this is correct behavior (better 8 diverse lineups than 11 locked ones).<br/>
              · <strong style={{color:"#22c55e"}}>Broader anchor rotation:</strong> Rotation now includes value plays at $4500+ sorted by value (FPPG/salary), not just $9k+ stars by FPPG. Fixes Sharpe/Vassell/Champagnie lock-in on small slates.<br/>
              · All v5.6 features retained (cascade fix, stack rotation, DvP star carveout, minutes retune, StatMuse overrides, Odds API fill)
            </div>
          </div>
        </div>
      )}

      {step === "build" && (
        <div style={S.sec}>
          {games.length === 0 && (
            <div style={{ marginBottom: 14, background: "#1a1200", border: "1px solid #f59e0b44", borderRadius: 8, padding: 12 }}>
              <div style={{ fontSize: 12, color: "#f59e0b" }}>[!] No games in slate - add via SLATE tab below</div>
            </div>
          )}
          {injuries.filter(i => i.status === "OUT").length > 0 && (
            <div style={{ marginBottom: 14, background: "#0a1a0a", border: "1px solid #22c55e44", borderRadius: 8, padding: "10px 14px", display: "flex", gap: 10, alignItems: "flex-start" }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: "#22c55e", letterSpacing: 1, marginTop: 1 }}>AUTO</div>
              <div style={{ fontSize: 11, color: "#94a3b8" }}>
                <span style={{ color: "#22c55e" }}>{injuries.filter(i => i.status === "OUT").length} players OUT</span> detected from CSV —{" "}
                <span style={{ color: "#e2e8f0" }}>{injuries.filter(i => i.status === "OUT").map(i => i.name).join(", ")}</span>
                {" "}— excluded and minutes cascaded automatically.
              </div>
            </div>
          )}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 16 }}>
            <div style={S.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#60a5fa", letterSpacing: 1 }}>{rightTab === "ownership" ? "OWNERSHIP" : rightTab === "statmuse" ? "STATMUSE" : rightTab === "slate" ? "SLATE" : "INJURIES"}</div>
                  <div style={{ fontSize: 10, color: "#4a6a80", marginTop: 2 }}>{players.length} players</div>
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  <button style={S.pill(rightTab === "slate")} onClick={() => setRightTab("slate")}>SLATE ({games.length})</button>
                  <button style={S.pill(rightTab === "matchups")} onClick={() => setRightTab("matchups")}>MATCHUPS</button>
                  <button style={S.pill(rightTab === "ownership")} onClick={() => setRightTab("ownership")}>OWNERSHIP</button>
                  <button style={S.pill(rightTab === "statmuse")} onClick={() => setRightTab("statmuse")}>STATMUSE {Object.keys(statMuseMap).length > 0 && `(${Object.keys(statMuseMap).length})`}</button>
                  <button style={S.pill(rightTab === "injuries")} onClick={() => setRightTab("injuries")}>INJURIES ({injuries.length})</button>
                </div>
              </div>
              {rightTab === "matchups" && (
                <div>
                  <div style={{ marginBottom: 12, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                    <button
                      onClick={fetchDvP}
                      disabled={dvpLoading}
                      style={{ background: dvpLoading ? "#1e3040" : "#7c3aed", color: "#fff", border: "none", borderRadius: 6, padding: "8px 16px", fontSize: 12, fontWeight: 700, cursor: dvpLoading ? "default" : "pointer", fontFamily: "inherit", letterSpacing: 1 }}
                    >
                      {dvpLoading ? "LOADING..." : "⚡ LOAD DvP DATA"}
                    </button>
                    <div style={{ fontSize: 10, color: "#4a6a80" }}>
                      ✅ Pre-loaded: Apr 19 2026 · Update numbers below anytime · Auto-pull coming soon
                    </div>
                  </div>
                  {dvpStatus && (
                    <div style={{ marginBottom: 10, fontSize: 10, padding: "6px 10px", borderRadius: 5,
                      background: dvpStatus.startsWith("✅") ? "#0a1a0a" : "#1a0a0a",
                      color: dvpStatus.startsWith("✅") ? "#22c55e" : "#ef4444",
                      border: `1px solid ${dvpStatus.startsWith("✅") ? "#16a34a44" : "#ef444444"}` }}>
                      {dvpStatus}
                    </div>
                  )}
                  <div style={{ marginBottom: 10, padding: "10px 12px", background: "#0a1520", border: "1px solid #a78bfa33", borderRadius: 8, fontSize: 10, color: "#a78bfa", lineHeight: 1.7 }}>
                    <strong style={{color:"#c4b5fd"}}>How it works:</strong> DvP = pts allowed per position vs league avg. A grade (+10%) = soft matchup, F grade (-12%) = lockdown. Auto-updates projections and lineup scores. <strong style={{color:"#22c55e"}}>v5.6:</strong> Stars (FPPG ≥ 45) get half the DvP penalty — their usage protects them vs tough D.
                    <br/>Or enter manually below. Auto minutes cascade fires when players are marked OUT in Injuries.
                  </div>
                  <DvPPanel games={games} dvpMap={dvpMap} onUpdate={setDvpMap} />
                </div>
              )}
              {rightTab === "slate" && <div><SlatePanel games={games} onUpdate={setGames} />{games.length > 0 && players.length > 0 && <button onClick={handleEstimateOwnership} style={{ ...S.btn("success"), marginTop: 12, width: "100%" }}>[*] AUTO-ESTIMATE OWNERSHIP</button>}</div>}
              {rightTab === "ownership" && <OwnershipEditor players={players} ownershipMap={ownershipMap} onUpdate={updateOwnership} />}
              {rightTab === "statmuse" && <StatMusePanel players={players} statMuseMap={statMuseMap} onManualUpdate={handleStatMuseManual} />}
              {rightTab === "injuries" && <InjuryEditor injuries={injuries} onUpdate={setInjuries} onExclude={(name) => applyExclusions([...excludedNames, name], name)} excludedNames={excludedNames} />}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={S.card}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#60a5fa", letterSpacing: 1, marginBottom: 10 }}>LOCK / EXCLUDE</div>
                <div style={{ maxHeight: 220, overflowY: "auto" }}>
                  {players.slice(0, 40).map(p => (
                    <div key={p.name} style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 5, fontSize: 11 }}>
                      <button onClick={() => toggleLock(p.name)} style={{ width: 20, height: 20, borderRadius: 4, border: `1px solid ${lockedNames.includes(p.name) ? "#22c55e" : "#1e3040"}`, background: lockedNames.includes(p.name) ? "#16a34a" : "transparent", color: "#fff", cursor: "pointer", fontSize: 9 }}>L</button>
                      <button onClick={() => toggleExclude(p.name)} style={{ width: 20, height: 20, borderRadius: 4, border: `1px solid ${excludedNames.includes(p.name) ? "#ef4444" : "#1e3040"}`, background: excludedNames.includes(p.name) ? "#991b1b" : "transparent", color: "#fff", cursor: "pointer", fontSize: 9 }}>X</button>
                      <span style={{ flex: 1, color: excludedNames.includes(p.name) ? "#4a6a80" : "#e2e8f0", textDecoration: excludedNames.includes(p.name) ? "line-through" : "none", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={S.card}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#60a5fa", letterSpacing: 1, marginBottom: 10 }}>GENERATE</div>
                <div style={{ fontSize: 10, color: "#4a6a80", marginBottom: 6, letterSpacing: 1 }}>STRATEGY</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, marginBottom: 14 }}>
                  {[["mixed","[AIM] MIXED","Balance"],["chalk","[PIN] CHALK","Cash / floor"],["leverage","[+] LEVERAGE","Ceiling stacks"],["tournament","[GPP] TOURN","Tail events"]].map(([val, label, desc]) => (
                    <button key={val} onClick={() => setLineupStrategy(val)} style={{ padding: "8px 10px", borderRadius: 7, border: `1px solid ${lineupStrategy === val ? "#3b82f6" : "#1e3040"}`, background: lineupStrategy === val ? "#1a3550" : "#0a1520", color: lineupStrategy === val ? "#60a5fa" : "#4a6a80", cursor: "pointer", textAlign: "left", fontFamily: "inherit" }}>
                      <div style={{ fontSize: 10, fontWeight: 700, marginBottom: 2 }}>{label}</div>
                      <div style={{ fontSize: 9, color: lineupStrategy === val ? "#4a8aaa" : "#3b6280" }}>{desc}</div>
                    </button>
                  ))}
                </div>
                <div style={{ fontSize: 10, color: "#4a6a80", marginBottom: 4, letterSpacing: 1 }}>LINEUP COUNT</div>
                <input type="range" min="1" max="150" value={lineupCount} onChange={e => setLineupCount(+e.target.value)} style={{ width: "100%", marginBottom: 4 }} />
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 12 }}>
                  <span style={{ color: "#60a5fa", fontWeight: 700, fontSize: 22 }}>{lineupCount}</span>
                  <input type="number" min="1" max="150" value={lineupCount} onChange={e => setLineupCount(Math.max(1,Math.min(150,+e.target.value||1)))} style={{ width: 60, background: "#0d1e2e", border: "1px solid #3b82f6", color: "#60a5fa", borderRadius: 6, padding: "4px 8px", fontSize: 14, fontFamily: "inherit", fontWeight: 700, textAlign: "center" }} />
                </div>
                {lineupCount > 50 && (
                  <div style={{ fontSize: 9, color: "#f59e0b", padding: "5px 8px", background: "#1a1200", borderRadius: 4, border: "1px solid #f59e0b33", marginBottom: 8, textAlign: "center" }}>
                    ⚠️ {lineupCount} lineups · est. {lineupCount > 100 ? "30-60" : "10-25"}s to generate
                  </div>
                )}
                <button style={{ ...S.btn("primary"), width: "100%", fontSize: 13, padding: "12px 0" }} onClick={handleGenerate} disabled={generating || players.length === 0}>{generating ? "BUILDING..." : players.length === 0 ? "UPLOAD CSV FIRST" : "[*] GENERATE"}</button>
                {/* [v5.7.2] Status banner — shows exactly what's happening on generate, including failure reasons */}
                {genStatus && (
                  <div style={{
                    marginTop: 10, padding: "10px 12px",
                    background: genStatus.startsWith("✅") ? "#0a1a0a" : genStatus.startsWith("❌") ? "#2a0a0a" : genStatus.startsWith("⚠️") ? "#2a1f00" : genStatus.startsWith("⚡") ? "#001e2e" : "#0a1520",
                    border: `1px solid ${genStatus.startsWith("✅") ? "#16a34a66" : genStatus.startsWith("❌") ? "#ef444466" : genStatus.startsWith("⚠️") ? "#f59e0b66" : genStatus.startsWith("⚡") ? "#60a5fa66" : "#3b82f644"}`,
                    borderRadius: 7, fontSize: 10,
                    color: genStatus.startsWith("✅") ? "#22c55e" : genStatus.startsWith("❌") ? "#ef4444" : genStatus.startsWith("⚠️") ? "#f59e0b" : genStatus.startsWith("⚡") ? "#60a5fa" : "#94a3b8",
                    lineHeight: 1.5, wordBreak: "break-word"
                  }}>
                    {genStatus}
                  </div>
                )}
                {/* [v5.7.2] Always-visible state summary so you can see what's loaded before clicking generate */}
                <div style={{ marginTop: 8, padding: "6px 10px", background: "#070e18", border: "1px solid #1e3040", borderRadius: 6, fontSize: 9, color: "#4a6a80", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 6 }}>
                  <span>Players: <strong style={{color: players.length > 0 ? "#22c55e" : "#ef4444"}}>{players.length}</strong></span>
                  <span>Games: <strong style={{color: games.length > 0 ? "#22c55e" : "#ef4444"}}>{games.length}</strong></span>
                  <span>Playoff: <strong style={{color: playoffMode ? "#22c55e" : "#4a6a80"}}>{playoffMode ? "ON" : "OFF"}</strong></span>
                  <span>Locks: <strong style={{color: "#60a5fa"}}>{lockedNames.length}</strong></span>
                  <span>Excl: <strong style={{color: "#60a5fa"}}>{excludedNames.length}</strong></span>
                </div>
                {cascadeLog.length > 0 && (
                  <div style={{ marginTop: 10, padding: "8px 10px", background: "#0a1a0a", border: "1px solid #16a34a33", borderRadius: 7 }}>
                    <div style={{ fontSize: 9, color: "#22c55e", letterSpacing: 2, marginBottom: 5 }}>[+] CASCADES APPLIED</div>
                    {cascadeLog.map((c, i) => <div key={i} style={{ fontSize: 9, color: "#4a6a80", marginBottom: 2 }}><span style={{ color: "#ef4444" }}>{c.out}</span>{" → "}<span style={{ color: "#22c55e" }}>{c.player}</span>{" "}<span style={{ color: "#94a3b8" }}>{`${c.from}% → ${c.to}%`}</span></div>)}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {step === "results" && (
        <div style={S.sec}>
          {lineups.length === 0 && (
            <div style={{ background: "#1a0a0a", border: "1px solid #ef444444", borderRadius: 10, padding: 24, textAlign: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 14, color: "#ef4444", marginBottom: 8 }}>[!] No lineups generated</div>
              <button onClick={() => setStep("build")} style={{ ...S.btn("primary"), marginTop: 12 }}>[←] BACK</button>
            </div>
          )}
          <div style={{ marginBottom: 12, padding: "10px 14px", background: "#0a1520", border: "1px solid #1e3040", borderRadius: 8, fontSize: 10, color: "#4a6a80", lineHeight: 1.8 }}>
            <span style={{ color: "#60a5fa", fontWeight: 700 }}>HOW TO UPLOAD TO FANDUEL: </span>
            <span style={{ color: "#e2e8f0" }}>Go to your contest → click </span>
            <span style={{ color: "#f59e0b" }}>Enter Lineups → Import Lineups</span>
            <span style={{ color: "#e2e8f0" }}> → download their template → </span>
            <span style={{ color: "#22c55e" }}>replace the player columns with your export</span>
            <span style={{ color: "#e2e8f0" }}>, OR try </span>
            <span style={{ color: "#f59e0b" }}>[↓] FD TEMPLATE</span>
            <span style={{ color: "#e2e8f0" }}> button which pre-fills the contest column format.</span>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            {["lineups","players","props","exposure"].map(t => <button key={t} style={S.pill(activeTab === t)} onClick={() => setActiveTab(t)}>{t.toUpperCase()}</button>)}
            <div style={{ marginLeft: "auto", display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button style={S.btn("ghost")} onClick={() => setStep("build")}>[←] EDIT</button>
              <button style={S.btn("success")} onClick={handleGenerate}>[R] REGEN</button>
              {lineups.length > 0 && (
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <button style={S.btn("warning")} onClick={handleExport}>[↓] EXPORT CSV</button>
                <button
                  style={{ ...S.btn("ghost"), fontSize: 10, padding: "9px 12px" }}
                  onClick={() => {
                    const csv = exportLineupsToFanDuelTemplate(lineups);
                    const ts = new Date().toISOString().slice(0,10);
                    downloadCSV(csv, `fanduel-template-${ts}.csv`);
                  }}
                >
                  [↓] FD TEMPLATE
                </button>
              </div>
            )}
            </div>
          </div>

          {activeTab === "lineups" && lineups.length > 0 && (
            <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 16 }}>
              <div style={{ maxHeight: "80vh", overflowY: "auto", paddingRight: 4 }}>
                {lineups.map((lu, i) => <LineupCard key={i} lineup={lu} index={i} isSelected={selectedLineup === i} onSelect={setSelectedLineup} />)}
              </div>
              {(() => {
                const lu = lineups[selectedLineup];
                if (!lu) return null;
                const stats = lineupStats(lu);
                const sorted = [...lu].sort((a, b) => POSITION_ORDER.indexOf(a.slot) - POSITION_ORDER.indexOf(b.slot));
                const ownColor = o => o >= 30 ? "#f59e0b" : o >= 10 ? "#60a5fa" : o >= 5 ? "#a78bfa" : "#f87171";
                return (
                  <div style={S.card}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 12 }}>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 700, color: "#60a5fa", letterSpacing: 1 }}>LINEUP #{selectedLineup + 1}</div>
                        {lu._simP90 && <div style={{ fontSize: 9, color: "#4a6a80", marginTop: 2 }}>Sim: mean {lu._simMean} · p75 {lu._simP75} · p90 {lu._simP90} · p99 {lu._simP99}</div>}
                        {lu._stackGame && <div style={{ fontSize: 9, color: "#22c55e", marginTop: 2 }}>Stack: {lu._stackGame}</div>}
                      </div>
                      <div style={{ display: "flex", gap: 18, fontSize: 12 }}>
                        <div><span style={{ color: "#4a6a80" }}>PROJ </span><span style={{ color: "#64b587", fontWeight: 700, fontSize: 20 }}>{stats.proj.toFixed(1)}</span></div>
                        <div><span style={{ color: "#4a6a80" }}>SAL </span><span style={{ color: "#e2e8f0", fontWeight: 700 }}>${stats.total.toLocaleString()}</span></div>
                        <div><span style={{ color: "#4a6a80" }}>OWN </span><span style={{ color: "#f59e0b", fontWeight: 700 }}>{stats.avgOwn.toFixed(1)}%</span></div>
                        <div><span style={{ color: "#4a6a80" }}>CUM </span><span style={{ color: stats.cumOwn < 150 ? "#22c55e" : stats.cumOwn < 200 ? "#f59e0b" : "#ef4444", fontWeight: 700 }}>{stats.cumOwn.toFixed(0)}%</span></div>
                      </div>
                    </div>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                      <thead><tr>{["SLOT","PLAYER","SAL","PROJ","PTS","REB","AST","STL","BLK","MATCH","OWN%"].map(h => <th key={h} style={{ padding: "7px 8px", textAlign: "left", color: "#3b6280", fontSize: 9, letterSpacing: 1, borderBottom: "1px solid #1e3040" }}>{h}</th>)}</tr></thead>
                      <tbody>
                        {sorted.map((p, i) => (
                          <tr key={i} style={{ borderBottom: "1px solid #0d1e2e" }}>
                            <td style={{ padding: "8px 6px", color: "#3b82f6", fontWeight: 700, fontSize: 11 }}>{p.slot}</td>
                            <td style={{ padding: "8px 6px" }}>
                              <div style={{ color: "#e2e8f0", fontSize: 11 }}>{p.name}{p.statMuseFD && <span style={{ color: "#22c55e", fontSize: 9, marginLeft: 3 }}>[.]</span>}</div>
                              <div style={{ fontSize: 9, color: "#4a6a80", marginTop: 1 }}>{p.team} · ${p.salary.toLocaleString()}</div>
                            </td>
                            <td style={{ padding: "8px 6px", color: "#64b587", fontWeight: 700 }}>{p.fppg.toFixed(1)}</td>
                            <td style={{ padding: "8px 6px" }}>
                              <span style={{ color: "#f0a500", fontWeight: 700, fontSize: 11 }}>{p.statLine?.pts?.toFixed(1) || "-"}</span>
                            </td>
                            <td style={{ padding: "8px 6px" }}>
                              <span style={{ color: "#60a5fa", fontSize: 11 }}>{p.statLine?.reb?.toFixed(1) || "-"}</span>
                            </td>
                            <td style={{ padding: "8px 6px" }}>
                              <span style={{ color: "#a78bfa", fontSize: 11 }}>{p.statLine?.ast?.toFixed(1) || "-"}</span>
                            </td>
                            <td style={{ padding: "8px 6px" }}>
                              <span style={{ color: "#22c55e", fontSize: 10 }}>{p.statLine?.stl?.toFixed(1) || "-"}</span>
                            </td>
                            <td style={{ padding: "8px 6px" }}>
                              <span style={{ color: "#22c55e", fontSize: 10 }}>{p.statLine?.blk?.toFixed(1) || "-"}</span>
                            </td>
                            <td style={{ padding: "8px 6px", textAlign: "center" }}>{p.dvpGrade ? <span style={{ fontSize: 10, fontWeight: 700, color: p.dvpGrade.color }}>{p.dvpGrade.grade}</span> : <span style={{color:"#3b6280"}}>-</span>}</td>
                            <td style={{ padding: "8px 6px" }}><span style={{ color: ownColor(p.ownership), fontWeight: 600 }}>{p.ownership.toFixed(1)}%</span></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <div style={{ marginTop: 14, padding: 10, background: "#0a1a2a", border: "1px solid #3b82f644", borderRadius: 6, fontSize: 10, color: "#60a5fa" }}>
                      <strong>Export:</strong> Click [↓] EXPORT CSV above to download all {lineups.length} lineups. Upload to FanDuel contest lobby → "Upload Lineups".
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {activeTab === "players" && (
            <div style={S.card}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#60a5fa", letterSpacing: 1, marginBottom: 14 }}>PLAYER POOL (ranked by composite score)</div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                <thead><tr>{["#","PLAYER","POS","SAL","PROJ","MIN","PTS","REB","AST","VALUE","OWN%","SCORE","ACTIONS"].map(h => <th key={h} style={{ padding: "7px 8px", textAlign: "left", color: "#3b6280", fontSize: 9, borderBottom: "1px solid #1e3040" }}>{h}</th>)}</tr></thead>
                <tbody>
                  {players.slice(0, 60).map((p, i) => {
                    const b = ownershipBucket(p.ownership);
                    const bc = { chalk: "#f59e0b", mid: "#60a5fa", low: "#a78bfa", punt: "#f87171" }[b];
                    return (
                      <tr key={p.name} style={{ borderBottom: "1px solid #0d1e2e", background: i % 2 ? "#0a1520" : "transparent" }}>
                        <td style={{ padding: "6px 8px", color: "#3b6280" }}>{i + 1}</td>
                        <td style={{ padding: "6px 8px", color: "#e2e8f0" }}>{p.name}</td>
                        <td style={{ padding: "6px 8px", color: "#3b82f6" }}>{p.positions[0]}</td>
                        <td style={{ padding: "6px 8px", color: "#64b587" }}>${p.salary.toLocaleString()}</td>
                        <td style={{ padding: "6px 8px", color: p.fppg >= 40 ? "#f59e0b" : "#e2e8f0" }}>{p.fppg.toFixed(1)}</td>
                        <td style={{ padding: "6px 8px", color: "#94a3b8" }}>{p.minutesProj?.toFixed(0) || "-"}</td>
                        <td style={{ padding: "6px 8px", color: "#f0a500", fontSize: 10, fontWeight: 600 }}>{p.statLine?.pts?.toFixed(1) || "-"}</td>
                        <td style={{ padding: "6px 8px", color: "#60a5fa", fontSize: 10 }}>{p.statLine?.reb?.toFixed(1) || "-"}</td>
                        <td style={{ padding: "6px 8px", color: "#a78bfa", fontSize: 10 }}>{p.statLine?.ast?.toFixed(1) || "-"}</td>
                        <td style={{ padding: "6px 8px", color: p.value >= 5 ? "#22c55e" : "#94a3b8" }}>{p.value.toFixed(2)}x</td>
                        <td style={{ padding: "6px 8px", color: bc, fontWeight: 600 }}>{p.ownership.toFixed(1)}%</td>
                        <td style={{ padding: "6px 8px", color: "#60a5fa" }}>{p.score.toFixed(2)}</td>
                        <td style={{ padding: "6px 8px" }}><div style={{ display: "flex", gap: 3 }}>
                          <button onClick={() => toggleLock(p.name)} style={{ fontSize: 9, padding: "2px 5px", borderRadius: 3, border: `1px solid ${lockedNames.includes(p.name) ? "#22c55e" : "#1e3040"}`, background: lockedNames.includes(p.name) ? "#16a34a33" : "transparent", color: lockedNames.includes(p.name) ? "#22c55e" : "#4a6a80", cursor: "pointer" }}>LOCK</button>
                          <button onClick={() => toggleExclude(p.name)} style={{ fontSize: 9, padding: "2px 5px", borderRadius: 3, border: `1px solid ${excludedNames.includes(p.name) ? "#ef4444" : "#1e3040"}`, background: excludedNames.includes(p.name) ? "#99000033" : "transparent", color: excludedNames.includes(p.name) ? "#ef4444" : "#4a6a80", cursor: "pointer" }}>OUT</button>
                        </div></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {activeTab === "props" && players.length > 0 && (
            <div style={S.card}>
              <div style={{ marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#60a5fa", letterSpacing: 1 }}>PLAYER PROP PROJECTIONS</div>
                  <div style={{ fontSize: 9, color: "#4a6a80", marginTop: 2 }}>
                    Hover any column header or stat for explanation · Vegas pace + Per-stat DvP + Injury cascade · Apr 19 2026
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12, fontSize: 9 }}>
                  {[["PTS","#f0a500"],["REB","#60a5fa"],["AST","#a78bfa"],["STL","#22c55e"],["BLK","#22c55e"]].map(([s,c]) => (
                    <span key={s} style={{ color: c, fontWeight: 700 }}>{s}</span>
                  ))}
                </div>
              </div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                <thead>
                  <tr style={{ background: "#0a1520" }}>
                    {[
                      ["PLAYER", "Player name. Green ↑ cascade = absorbing minutes from an injured teammate on same team + position."],
                      ["POS", "Position. Determines which DvP column applies."],
                      ["TEAM", "Player's team abbreviation."],
                      ["SAL", "FanDuel salary. Higher = more expensive roster slot."],
                      ["PROJ FD", "Total projected FanDuel pts = base FPPG × Vegas pace × implied pts × spread adj × DvP matchup + injury cascade boost."],
                      ["PTS", "Projected points scored tonight. Adjusted for: pace (game total), DvP (opponent pts allowed to this position), injury minutes."],
                      ["REB", "Projected rebounds. Centers/PFs scale up. Faster pace = more miss opportunities = more rebounds."],
                      ["AST", "Projected assists. PGs get highest weight. Adjusted for opponent's AST allowed to position."],
                      ["STL", "Projected steals. Small boost, but at 3× FD scoring they matter."],
                      ["BLK", "Projected blocks. Centers/PFs dominate. Worth 3× in FD scoring."],
                      ["MATCH", "Matchup grade vs tonight's opponent defense. A = soft (+10% boost), B = favorable (+5%), C = neutral, D = tough (-5%), F = lockdown (-12%). v5.6: stars get half the penalty when grade is D or F."],
                      ["MINUTES", "Estimated minutes. +Xm in green = extra minutes absorbed from injured teammate (capped at 38min stamina limit in v5.6)."],
                    ].map(([h, tip]) => (
                      <th key={h} style={{ padding: "7px 8px", textAlign: "left", color: "#3b6280", fontSize: 9, letterSpacing: 1, borderBottom: "1px solid #1e3040" }}>
                        <Tip text={tip} wide={h === "PROJ FD" || h === "MATCH" || h === "PLAYER"}>{h} <span style={{color:"#1e3040"}}>?</span></Tip>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {players.filter(p => p.statLine).slice(0, 60).map((p, i) => {
                    const sl = p.statLine;
                    const matchColor = p.dvpGrade?.color || "#94a3b8";
                    const hasBoost = p.minuteBoost > 0;
                    return (
                      <tr key={p.name} style={{ borderBottom: "1px solid #0d1e2e", background: i % 2 ? "#0a1520" : "transparent" }}>
                        <td style={{ padding: "7px 8px" }}>
                          <div style={{ color: "#e2e8f0", fontWeight: p.fppg >= 40 ? 700 : 400 }}>{p.name}</div>
                          {hasBoost && <div style={{ fontSize: 8, color: "#22c55e" }}>↑ cascade +{p.minuteBoost?.toFixed(1)} FD</div>}
                        </td>
                        <td style={{ padding: "7px 8px", color: "#3b82f6" }}>{p.positions[0]}</td>
                        <td style={{ padding: "7px 8px", color: "#4a6a80" }}>{p.team}</td>
                        <td style={{ padding: "7px 8px", color: "#64b587" }}>${p.salary.toLocaleString()}</td>
                        <td style={{ padding: "7px 8px", color: "#64b587", fontWeight: 700 }}>{p.fppg.toFixed(1)}</td>
                        <td style={{ padding: "7px 8px" }}>
                          <Tip text={`Projected ${sl.pts?.toFixed(1)} pts. Vegas env + DvP vs ${vegasMap[p.team]?.opponent || "opponent"} + pace${p.minuteBoost > 0 ? " + injury cascade" : ""}.`} wide>
                            <span style={{ color: "#f0a500", fontWeight: 700 }}>{sl.pts?.toFixed(1)}</span>
                          </Tip>
                        </td>
                        <td style={{ padding: "7px 8px" }}>
                          <Tip text={`Projected ${sl.reb?.toFixed(1)} rebounds. ${p.positions[0] === "C" || p.positions[0] === "PF" ? "Big man role — primary rebounder." : "Guard/wing — opportunity rebounds only."} Adjusted for opponent reb allowed to ${p.positions[0]}s.`}>
                            <span style={{ color: "#60a5fa" }}>{sl.reb?.toFixed(1)}</span>
                          </Tip>
                        </td>
                        <td style={{ padding: "7px 8px" }}>
                          <Tip text={`Projected ${sl.ast?.toFixed(1)} assists. ${p.positions[0] === "PG" ? "Primary ball handler — high assist floor." : p.positions[0] === "SG" || p.positions[0] === "SF" ? "Secondary playmaker." : "Low assist expectation for this position."} Adjusted for opponent AST allowed.`}>
                            <span style={{ color: "#a78bfa" }}>{sl.ast?.toFixed(1)}</span>
                          </Tip>
                        </td>
                        <td style={{ padding: "7px 8px" }}>
                          <Tip text={`Projected ${sl.stl?.toFixed(1)} steals. Worth 3× FD points. Steals = ${((sl.stl||0)*3).toFixed(1)} FD contribution.`}>
                            <span style={{ color: "#22c55e", fontSize: 10 }}>{sl.stl?.toFixed(1)}</span>
                          </Tip>
                        </td>
                        <td style={{ padding: "7px 8px" }}>
                          <Tip text={`Projected ${sl.blk?.toFixed(1)} blocks. Worth 3× FD points. Blocks = ${((sl.blk||0)*3).toFixed(1)} FD contribution. ${p.positions[0] === "C" ? "Centers are primary shot blockers." : ""}`}>
                            <span style={{ color: "#22c55e", fontSize: 10 }}>{sl.blk?.toFixed(1)}</span>
                          </Tip>
                        </td>
                        <td style={{ padding: "7px 8px", textAlign: "center" }}>
                          <Tip text={`${p.dvpGrade?.grade || "?"} matchup vs ${vegasMap[p.team]?.opponent || "opp"}. ${p.dvpAdj ? ((p.dvpAdj-1)*100).toFixed(1)+"% vs league avg" : ""}. ${p.dvpAdj >= 1.08 ? "Soft D — target." : p.dvpAdj >= 1.03 ? "Favorable." : p.dvpAdj >= 0.97 ? "Neutral." : p.dvpAdj >= 0.92 ? "Tough — discount." : "Lockdown — star carveout may apply."}`} wide>
                            {p.dvpGrade ? <span style={{ fontSize: 10, fontWeight: 700, color: matchColor, padding: "1px 5px", background: matchColor + "22", borderRadius: 3 }}>{p.dvpGrade.grade}</span> : <span style={{ color: "#3b6280" }}>-</span>}
                          </Tip>
                        </td>
                        <td style={{ padding: "7px 8px", fontSize: 10 }}>
                          <Tip text={`Estimated ${p.minutesProj?.toFixed(0) || "?"} min from salary tier. ${hasBoost ? "Extra minutes from injured teammate cascade (capped at 38min stamina limit). More mins = more pts/reb/ast." : "Standard rotation minutes."}`} wide>
                            <span style={{ color: "#94a3b8" }}>{p.minutesProj?.toFixed(0) || "-"} min</span>
                            {hasBoost && <span style={{ color: "#22c55e" }}> +{(p.minuteBoost / (p.fppg / (p.minutesProj || 30)))?.toFixed(0)}m</span>}
                          </Tip>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {activeTab === "exposure" && lineups.length > 0 && (
            <div style={S.card}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#60a5fa", letterSpacing: 1, marginBottom: 14 }}>EXPOSURE - {lineups.length} LINEUPS</div>
              {(() => {
                const exp = {};
                lineups.forEach(lu => lu.forEach(p => { exp[p.name] = (exp[p.name] || 0) + 1; }));
                return (
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                    <thead><tr>{["PLAYER","APPS","EXP%","OWN%","PROJ","POS"].map(h => <th key={h} style={{ padding: "7px 8px", textAlign: "left", color: "#3b6280", fontSize: 9, borderBottom: "1px solid #1e3040" }}>{h}</th>)}</tr></thead>
                    <tbody>
                      {Object.entries(exp).sort((a,b) => b[1]-a[1]).map(([name, cnt], i) => {
                        const p = players.find(pl => pl.name === name);
                        const pct = cnt / lineups.length * 100;
                        return (
                          <tr key={name} style={{ borderBottom: "1px solid #0d1e2e", background: i % 2 ? "#0a1520" : "transparent" }}>
                            <td style={{ padding: "7px 8px", color: "#e2e8f0" }}>{name}</td>
                            <td style={{ padding: "7px 8px", color: "#e2e8f0" }}>{cnt}</td>
                            <td style={{ padding: "7px 8px", color: pct > 60 ? "#f59e0b" : "#94a3b8" }}>{pct.toFixed(0)}%</td>
                            <td style={{ padding: "7px 8px", color: "#60a5fa" }}>{p?.ownership.toFixed(1) ?? "-"}%</td>
                            <td style={{ padding: "7px 8px", color: p?.statMuseFD ? "#22c55e" : "#e2e8f0" }}>{p?.fppg.toFixed(1) ?? "-"}</td>
                            <td style={{ padding: "7px 8px", color: "#3b82f6" }}>{p?.positions[0] ?? "-"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                );
              })()}
            </div>
          )}
        </div>
      )}

      <div style={{ textAlign: "center", padding: "20px", fontSize: 9, color: "#3b6280", letterSpacing: 2 }}>MAXRESULTS4U BUSINESS SOLUTIONS · COURT EDGE v5.8.1</div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
