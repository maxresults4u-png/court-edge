async function fetchDVPForPosition(pos, platform) {
    const site = platform === "DK" ? "draftkings" : "fanduel";
    const url = `https://www.fantasypros.com/daily-fantasy/nba/${site}-defense-vs-position.php`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error("DVP fetch failed");
    const html = await res.text();
    // Parse table rows: each row = one team's stats for this view
    // Table columns: Team | GP | PTS | REB | AST | 3PM | STL | BLK | TO | FD PTS
    const rowRegex = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
    const cellRegex = /<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi;
    const stripTags = s => s.replace(/<[^>]+>/g,"").replace(/&amp;/g,"&").replace(/&nbsp;/g," ").trim();
    const results = {};
    let match;
    while ((match = rowRegex.exec(html)) !== null) {
        const row = match[1];
        const cells = [];
        let cm;
        while ((cm = cellRegex.exec(row)) !== null) cells.push(stripTags(cm[1]));
        if (cells.length < 9) continue;
        // First cell contains team name (may include abbreviation)
        const teamRaw = cells[0].toLowerCase()
            .replace(/\n/g," ").replace(/\s+/g," ").trim()
            // Remove the abbreviated prefix like "ATL" from "ATLAtlanta Hawks"
            .replace(/^[a-z]{2,4}(?=[a-z])/,"");
        const abbr = FP_TEAM_MAP[teamRaw] || Object.entries(FP_TEAM_MAP).find(([k])=>teamRaw.includes(k.split(" ")[0]))?.[1];
        if (!abbr) continue;
        const fdPts = parseFloat(cells[cells.length-1]);
        const pts   = parseFloat(cells[2]);
        const reb   = parseFloat(cells[3]);
        const ast   = parseFloat(cells[4]);
        if (isNaN(fdPts) || fdPts <= 0) continue;
        results[abbr] = { fdPts, pts, reb, ast };
    }
    return results; // { "ATL": { fdPts, pts, reb, ast }, ... }
}
// Convert raw FD pts allowed → grade + multipliers
function buildDVPMaps(dvpByPos) {
    // dvpByPos = { PG: { ATL:{fdPts,pts,reb,ast}, ... }, SG: {...}, ... }
    const newPosDef = {};
    const newStatDef = {};
    for (const pos of POSITIONS_TO_FETCH) {
        const posData = dvpByPos[pos];
        if (!posData || Object.keys(posData).length === 0) continue;
        const values = Object.values(posData).map(v => v.fdPts).filter(v => !isNaN(v));
        if (!values.length) continue;
        const avg   = values.reduce((a,b)=>a+b,0)/values.length;
        const sorted = [...values].sort((a,b)=>a-b);
        const p25 = sorted[Math.floor(sorted.length*0.25)];
        const p75 = sorted[Math.floor(sorted.length*0.75)];
        for (const [team, data] of Object.entries(posData)) {
            if (!newPosDef[team]) newPosDef[team] = {};
            if (!newStatDef[team]) newStatDef[team] = { pts:1.0, reb:1.0, ast:1.0, _count:0 };
            // Grade: A = top 25% pts allowed (easiest), D = bottom 25% (hardest)
            const grade = data.fdPts >= p75 ? "A"
                        : data.fdPts >= avg  ? "B"
                        : data.fdPts >= p25  ? "C" : "D";
            newPosDef[team][pos] = grade;
            // Multiplier: actual/avg (capped 0.80–1.25)
            const mult = Math.min(1.25, Math.max(0.80, data.fdPts / avg));
            // Average stat multipliers across all positions for PRA projections
            const ptsAvg = Object.values(posData).map(v=>v.pts).reduce((a,b)=>a+b,0)/Object.keys(posData).length;
            const rebAvg = Object.values(posData).map(v=>v.reb).reduce((a,b)=>a+b,0)/Object.keys(posData).length;
            const astAvg = Object.values(posData).map(v=>v.ast).reduce((a,b)=>a+b,0)/Object.keys(posData).length;
            newStatDef[team].pts  = +(newStatDef[team].pts + (data.pts/ptsAvg)).toFixed(3);
            newStatDef[team].reb  = +(newStatDef[team].reb + (data.reb/rebAvg)).toFixed(3);
            newStatDef[team].ast  = +(newStatDef[team].ast + (data.ast/astAvg)).toFixed(3);
            newStatDef[team]._count++;
        }
    }
    // Average stat multipliers across all fetched positions
    for (const team of Object.keys(newStatDef)) {
        const n = newStatDef[team]._count || 1;
        newStatDef[team].pts = +((newStatDef[team].pts - 1.0) / n + 1.0).toFixed(3);
        newStatDef[team].reb = +((newStatDef[team].reb - 1.0) / n + 1.0).toFixed(3);
        newStatDef[team].ast = +((newStatDef[team].ast - 1.0) / n + 1.0).toFixed(3);
        delete newStatDef[team]._count;
    }
    return { newPosDef, newStatDef };
}

function fdPosToNba(fdPos) {
  if(!fdPos) return null;
  const p=fdPos.toUpperCase();
  if(p==='PG'||p==='SG') return 'G';
  if(p==='SF'||p==='PF') return 'F';
  if(p==='C') return 'C';
  return null;
}
function getDvpMult(playerName, opponent, fdPos) {
  const nbaPos=fdPosToNba(fdPos);
  if(!nbaPos||!opponent) return 1.0;
  const teamDvp=LIVE_DATA.dvp[opponent];
  if(!teamDvp?.[nbaPos]) return 1.0;
  return Math.max(0.88,Math.min(1.12,teamDvp[nbaPos].mult||1.0));
}
function getLiveInjuryMult(playerName) {
  const inj=LIVE_DATA.injuries[playerName?.toLowerCase()];
  if(!inj) return 1.0;
  switch(inj.status) {
    case 'OUT': return 0.0;
    case 'DOUBTFUL': return 0.25;
    case 'QUESTIONABLE': return 0.80;
    case 'DAY-TO-DAY': return 0.88;
    default: return 1.0;
  }
}
function getLiveAvailabilityMult(playerName) {
  const d=LIVE_DATA.playerStats[playerName?.toLowerCase()];
  if(!d) return 1.0;
  const gp=d.gp||0;
  if(gp===0) return 0.0;
  if(gp>=9)  return 1.0;
  if(gp>=7)  return 0.95;
  if(gp>=5)  return 0.85;
  return 0.70;
}
async function fetchLiveData() {
  const badge=document.getElementById('data-status-badge');
  if(badge){badge.textContent='⟳ Fetching live data...';badge.style.background='#f59e0b';}
  const results=await Promise.allSettled([
    fetch('/api/playerstats?lastN=10').then(r=>r.json()),
    fetch('/api/dvp').then(r=>r.json()),
    fetch('/api/scoreboard').then(r=>r.json()),
    fetch('/api/injuries').then(r=>r.json()),
    fetch('/api/odds').then(r=>r.json()),
    fetch('/api/roster').then(r=>r.json()),
  ]);
  const [s,d,sb,inj,odds,roster]=results;
  let ok=0;
  if(s.status==='fulfilled'&&s.value?.players){
    s.value.players.forEach(p=>{LIVE_DATA.playerStats[p.name]=p;});ok++;
    console.log('Player stats:',s.value.players.length,'players');
  }
  if(d.status==='fulfilled'&&d.value?.dvp){
    LIVE_DATA.dvp=d.value.dvp;LIVE_DATA.leagueAvgDvp=d.value.leagueAvg;ok++;
    console.log('DVP loaded:',Object.keys(LIVE_DATA.dvp).length,'teams');
  }
  if(sb.status==='fulfilled'&&sb.value?.games){
    LIVE_DATA.games=sb.value.games;ok++;
    console.log('Games tonight:',LIVE_DATA.games.length);
  }
  if(inj.status==='fulfilled'&&inj.value?.injuryMap){
    LIVE_DATA.injuries=inj.value.injuryMap;ok++;
    console.log('Injuries:',inj.value.count,'players');
  }
  if(odds.status==='fulfilled'&&odds.value?.gamesList?.length>0){
    LIVE_DATA.odds.teamMap=odds.value.teamMap;
    LIVE_DATA.odds.gamesList=odds.value.gamesList;
    LIVE_DATA.odds.fetchedAt=odds.value.fetchedAt;
    ok++;
    console.log('Odds loaded:',odds.value.gamesList.length,'games, quota remaining:',odds.value.quotaRemaining);
    // Force React to re-render the slate panel so it picks up live odds
    // Trigger React re-render via exposed callback
    if (typeof window.__onOddsReady === 'function') window.__onOddsReady();
  }
  if(roster.status==='fulfilled'&&roster.value?.games?.length>0){
    LIVE_DATA.roster.probables=roster.value.probables||{};
    LIVE_DATA.roster.games=roster.value.games||[];
    LIVE_DATA.roster.counts=roster.value.counts||{};
    LIVE_DATA.roster.fetchedAt=roster.value.fetchedAt;
    ok++;
    console.log('Roster loaded:',roster.value.counts?.active,'active,',roster.value.counts?.out,'out,',roster.value.counts?.questionable,'questionable');
  }
  LIVE_DATA.status=ok>0?'ready':'error';
  if(badge){
    badge.textContent=ok>0?'✅ Live data ('+ok+'/6 feeds)':'⚠️ Using cached data';
    badge.style.background=ok>0?'#10b981':'#ef4444';
    // Auto-dismiss after 4 seconds
    setTimeout(() => {
      badge.style.transition = 'opacity 0.8s ease';
      badge.style.opacity = '0';
      setTimeout(() => { badge.style.display = 'none'; }, 800);
    }, 4000);
  }
}

function exportLineupsCSV(lineups, platform) {

    const isSD = platform === "DK_SD" || platform === "FD_SD";

    // Classic FD slot order: PG,PG,SF,SF,PF,PF,C,SG,SG (9 slots)
    // Classic DK slot order: PG,SG,SF,PF,C,G,F,UTIL (8 slots)
    // DK Showdown: CPT,FLEX,FLEX,FLEX,FLEX,FLEX (6 slots) — exports as player names
    // FD Showdown: MVP,STAR,PRO,UTIL,UTIL (5 slots)
    const slotOrder = platform === "FD_SD"

            slotMap[p.slot].push(p);

            const candidates = slotMap[slot] || [];
            const p = candidates.find(c => !usedNames.has(c.name));
            if (p) {

// ── LINEUP ENGINE ────────────────────────────────────────────────────────
function buildLineup(players, lockedNames = [], excludedNames = []) {
    // Separate locked from pool
    const locked = players.filter(p => lockedNames.includes(p.name));
    const pool = players.filter(p => !excludedNames.includes(p.name) && !lockedNames.includes(p.name));
    // Roster slots from current platform config

        return counts;

    const place = (p, pos) => {

        return true;

    // 1. Place locked players
    for (const p of locked) {
        for (const pos of p.positions) {

                place(p, pos);
                break;
            }
        }
    }
    // 2. Greedy fill: iterate pool in given order, place each player in first available slot
    //    Budget guard: dynamic — uses actual pool min salary (handles DK Showdown $1K players)
    const poolMinSal = pool.length ? Math.min(...pool.map(p => p.salary)) : 3500;
    for (const p of pool) {
        if (used.has(p.name))
            continue;
        const slotsLeft = Object.values(needed).reduce((a, b) => a + b, 0);
        if (slotsLeft === 0)
            break;
        for (const pos of p.positions) {
            if ((needed[pos] || 0) > 0) {
                const budgetAfter = budget - p.salary;
                const minNeeded = (slotsLeft - 1) * poolMinSal;
                if (budgetAfter >= minNeeded && canPlace(p)) {
                    place(p, pos);
                    break;
                }
            }
        }
    }
    // 3. If any slots still open, fill with cheapest eligible players regardless of score
    if (Object.values(needed).reduce((a, b) => a + b, 0) > 0) {
        const cheap = [...pool].filter(p => !used.has(p.name)).sort((a, b) => a.salary - b.salary);
        for (const p of cheap) {
            const slotsLeft = Object.values(needed).reduce((a, b) => a + b, 0);
            if (slotsLeft === 0)
                break;
            for (const pos of p.positions) {
                if ((needed[pos] || 0) > 0 && budget - p.salary >= 0 && canPlace(p)) {
                    place(p, pos);
                    break;
                }
            }
        }
    }
    return lineup.length === RULES.LINEUP_SIZE ? lineup : null;
}
// ── OPTIMIZER SETTINGS (read from UI sliders) ────────────────────────────
function getOptimizerSettings() {

// Apply randomness to projections — inject per-player variance

function applyRandomness(players, randomnessPct) {

        // Higher-upside players (high fppg) get slightly more variance (GPP logic)
        const variance = r * (0.6 + Math.random() * 0.8);

        return { ...p, score: p.score * (1 + direction * variance) };

        // gradually relax uniqueness requirement (never below 1)

                : 1;                              // minimum uniqueness for last 12%

        const noised = applyRandomness(players, randomnessPct);
